<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boutique – MANG Marketplace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f4f6f8;
  color:#333;
}

/* ================= CONTAINER ================= */
.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

/* ================= LOGO ================= */
.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  height:55px;
}

/* ================= HEADER ================= */
.shop-header{
  background:linear-gradient(135deg,#1B8F3A,#2ECC71);
  color:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.shop-header h2{
  margin:0;
}

.shop-actions{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.shop-actions button{
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* boutons */
.copy-btn{
  background:white;
  color:#1B8F3A;
}

.visit-btn{
  background:#0d5c2a;
  color:white;
}

/* ================= CTA PRINCIPAL ================= */
.main-cta{
  margin-top:15px;
  background:#fff;
  color:#1B8F3A;
  padding:12px;
  border-radius:12px;
  font-weight:600;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.main-cta:hover{
  background:#e6f6ee;
}

/* ================= OWNER ================= */
.owner{
  margin-top:10px;
  font-size:14px;
}

/* ================= EXTRA ================= */
.shop-extra{
  margin-top:10px;
}

/* badges */
.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  margin-right:5px;
}

.badge.ok{
  background:#e6f6ee;
  color:#1B8F3A;
}

.badge.no{
  background:#ffeaea;
  color:#e53935;
}

/* whatsapp */
.whatsapp{
  display:inline-block;
  background:#25D366;
  color:white;
  padding:8px 14px;
  border-radius:999px;
  text-decoration:none;
  margin-top:6px;
}

/* ================= SEARCH ================= */
.search-box{
  margin:20px 0;
}

.search-box input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* ================= PRODUCTS ================= */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:20px;
}

.product{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.25s;
  display:flex;
  flex-direction:column;
}

.product:hover{
  transform:translateY(-5px);
}

.product img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.product-content{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex-grow:1;
}

.product h4{
  margin:0 0 5px;
  font-size:15px;
}

.product p{
  font-size:13px;
  color:#777;
  flex-grow:1;
}

.product strong{
  color:#1B8F3A;
  font-size:16px;
}

.buy-btn{
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1B8F3A;
  color:white;
  cursor:pointer;
}

/* ================= EMPTY ================= */
.empty{
  text-align:center;
  margin-top:30px;
  color:#777;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="logo">
  <img src="assets/img/logos.png" alt="MANG Logo">
</div>

<!-- HEADER -->
<div class="shop-header">
  <h2 id="shopName">Boutique</h2>

  <div class="shop-actions">
    <button class="copy-btn" id="copyLinkBtn">🔗 Copier</button>
    <button class="visit-btn" id="visitSiteBtn">🏠 Accueil</button>
  </div>

  <!-- CTA -->
  <div class="main-cta" id="mainCTA">
    🚀 Découvrir la plateforme MANG
  </div>

  <div class="owner" id="shopOwner"></div>
  <div class="shop-extra" id="shopExtras"></div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Rechercher un produit...">
</div>

<!-- PRODUCTS -->
<div class="products" id="productsContainer"></div>

</div>

<script type="module">

import { supabase } from './supabase.js';

const shopId = new URLSearchParams(location.search).get("id");

const shopNameEl = document.getElementById("shopName");
const shopOwnerEl = document.getElementById("shopOwner");
const shopExtrasEl = document.getElementById("shopExtras");
const productsContainer = document.getElementById("productsContainer");

const searchInput = document.getElementById("searchInput");

let allProducts = [];

/* ===== COPY LINK ===== */
document.getElementById("copyLinkBtn").onclick = () => {
  navigator.clipboard.writeText(location.href);
  alert("Lien copié !");
};

/* ===== GO HOME ===== */
document.getElementById("visitSiteBtn").onclick = () => {
  location.href = "index.html";
};

/* ===== CTA REDIRECTION ===== */
document.getElementById("mainCTA").onclick = () => {
  window.location.href = "https://marketplace2026.github.io/MANG---March-Agricole/";
};

/* ===== LOAD SHOP ===== */
async function loadShop(){

  const { data: shop } = await supabase
    .from("shops")
    .select("*")
    .eq("id", shopId)
    .single();

  if(!shop){
    productsContainer.innerHTML = "<p class='empty'>Boutique introuvable</p>";
    return;
  }

  shopNameEl.innerText = shop.name;

  const { data: owner } = await supabase
    .from("profiles")
    .select("username")
    .eq("id", shop.owner_id)
    .single();

  shopOwnerEl.innerText = "👤 " + (owner?.username || "Inconnu");

  let extraHTML = "";

  extraHTML += shop.livraison
    ? `<span class="badge ok">🚚 Livraison disponible</span>`
    : `<span class="badge no">❌ Pas de livraison</span>`;

  if(shop.whatsapp){
    extraHTML += `
      <br>
      <a href="https://wa.me/${shop.whatsapp}" target="_blank" class="whatsapp">
        💬 Contacter sur WhatsApp
      </a>
    `;
  }

  shopExtrasEl.innerHTML = extraHTML;

  const { data: products } = await supabase
    .from("shop_products")
    .select("*")
    .eq("shop_id", shopId);

  allProducts = products || [];

  renderProducts(allProducts);
}

/* ===== RENDER PRODUCTS ===== */
function renderProducts(products){

  productsContainer.innerHTML = "";

  if(products.length === 0){
    return productsContainer.innerHTML = "<p class='empty'>Aucun produit</p>";
  }

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      ${p.image_url ? `<img src="${p.image_url}">` : ""}
      <div class="product-content">
        <h4>${p.name}</h4>
        <p>${p.description || ""}</p>
        <strong>${p.price} FCFA</strong>
        <button class="buy-btn">Voir</button>
      </div>
    `;

    div.onclick = () => {
      alert("Produit: " + p.name);
    };

    productsContainer.appendChild(div);
  });
}

/* ===== SEARCH ===== */
searchInput.oninput = () => {
  const value = searchInput.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  renderProducts(filtered);
};

loadShop();

</script>

</body>
</html>
