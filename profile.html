<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil - MANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f8;
color:#333;
}

/* container */

.container{
max-width:480px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* ===================== */
/* HEADER PROFIL */
/* ===================== */

.profile-header{

background:linear-gradient(135deg,#1B8F3A,#2ECC71);

color:white;

border-radius:18px;

padding:35px 20px 28px;

text-align:center;

position:relative;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

/* bouton retour */
.back-btn{

position:absolute;

left:15px;
top:15px;

font-size:30px;

cursor:pointer;

color:white;

}


/* avatar */

.avatar{

width:100px;
height:100px;

border-radius:50%;

background:white;
color:#1B8F3A;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;
font-weight:700;

margin:auto;
margin-bottom:10px;

border:4px solid rgba(255,255,255,0.6);

box-shadow:0 6px 18px rgba(0,0,0,0.2);

}

/* nom utilisateur */

#displayName{
font-size:20px;
margin-top:5px;
}

/* email */

.email{
font-size:13px;
opacity:0.9;
}

/* badge */

.user-badge{

margin-top:6px;

display:inline-block;

background:rgba(255,255,255,0.25);

padding:4px 10px;

border-radius:20px;

font-size:11px;

}

/* ===================== */
/* CARTE STATS */
/* ===================== */

.card{

background:white;

border-radius:14px;

padding:16px;

box-shadow:0 3px 10px rgba(0,0,0,0.06);

}

.stats{

display:flex;

justify-content:space-between;

text-align:center;

}

.stat{
flex:1;
}

.stat h3{

font-size:18px;

color:#1B8F3A;

}

.stat p{

font-size:12px;

color:#777;

}

/* ===================== */
/* MENU */
/* ===================== */

.menu{

display:flex;

flex-direction:column;

gap:6px;

}

.menu-btn{

background:white;

border:none;

padding:15px;

border-radius:12px;

display:flex;

align-items:center;

justify-content:space-between;

font-size:14px;

cursor:pointer;

box-shadow:0 2px 6px rgba(0,0,0,0.05);

transition:0.2s;

}

.menu-btn:hover{

transform:translateY(-1px);

box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.menu-left{

display:flex;

align-items:center;

gap:10px;

}

.icon{

font-size:18px;

color:#1B8F3A;

}

.arrow{

font-size:16px;

color:#bbb;

}

.badge{

background:red;

color:white;

font-size:10px;

padding:2px 6px;

border-radius:20px;

}

.logout{
color:#e53935;
}

.message{

margin-top:10px;

font-size:13px;

text-align:center;

color:#666;

}

#favoritesModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);

  display: none;
  justify-content: flex-end;

  z-index: 9999;
}

#favoritesModal.active{
  display: flex;
}
.notifHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px;

  border-bottom:1px solid #ddd;

  font-weight:600;
  font-size:16px;

  background:#f9f9f9;
}

/* bouton X */
.notifHeader button{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

/* boutons onglets */
.favoritesTabs{
  display:flex;
  gap:10px;

  padding:12px;

  border-bottom:1px solid #eee;
}

.favoritesTabs button{
  border:none;
  background:#f5f5f5;

  padding:8px 12px;

  border-radius:8px;

  cursor:pointer;
}

/* liste favoris */
#favoritesShopsList,
#favoritesProductsList{
  flex:1;
  overflow-y:auto;

  padding:10px;

  padding-bottom:120px;
}
  
.favorite-shop-btn {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
}

.favorite-shop-btn.active {
  background: #ffe5e5;
  border-color: red;
}
  /* Overlay sombre */
#favoritesPanel{
  width: 100%;
  max-width: 420px;
  height: 100%;

  background: white;

  display: flex;
  flex-direction: column;

  animation: slideIn 0.3s ease;

  box-shadow: -10px 0 40px rgba(0,0,0,0.2);
}

@keyframes slideIn{
  from{ transform: translateX(100%); }
  to{ transform: translateX(0); }
}
/* MODAL SHOPS */
#shopsModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: flex-end;
  z-index: 9999;
}

#shopsModal.active{
  display: flex;
}

#shopsPanel{
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: white;
  display: flex;
  flex-direction: column;
  animation: slideIn 0.3s ease;
  overflow-y: auto;
}

/* HEADER */
.shopsHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:1px solid #eee;
  font-weight:600;
}

.shopsHeader button{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

/* STATS */
.shopsStats{
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:#f9f9f9;
}

.shopStat{
  text-align:center;
}

.shopStat h3{
  color:#1B8F3A;
  font-size:16px;
}

.shopStat p{
  font-size:11px;
  color:#777;
}

/* LISTE BOUTIQUES */
#shopsList{
  flex:1;
  overflow-y:auto;
  padding:12px;
}

.shopCard{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.shopCard h4{
  margin-bottom:5px;
}

.shopCard .shopActions{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.shopCard .shopActions button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#f1f1f1;
}

/* PRODUITS */
#shopFullModal{
  margin-top:15px;
}

.productCard{
  background:#fff;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 1px 5px rgba(0,0,0,0.05);
}

.productCard img{
  max-width:100%;
  border-radius:8px;
  margin-bottom:6px;
}
</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="profile-header">

<span class="back-btn" onclick="window.location.href='index.html'">←</span>

<div class="avatar" id="initialLetter">U</div>

<h3 id="displayName">Utilisateur</h3>

<div class="email" id="userEmail"></div>

<div class="user-badge">Utilisateur MANG</div>

</div>

<!-- STATISTIQUES -->

<div class="card">

<div class="stats">

<div class="stat">
<h3 id="walletBalance">0 FCFA</h3>
<p>Solde</p>
</div>

<div class="stat">
<h3 id="totalTransactions">0</h3>
<p>Transactions</p>
</div>

<div class="stat">
<h3 id="createdAt"></h3>
<p>Inscription</p>
</div>

</div>

</div>


    <!-- MENU -->
<div class="card">
  <div class="menu">

    <button id="btnMesCommandes" class="menu-btn">
      <div class="menu-left">
        <span class="icon">📦</span>
        <span>Mes commandes</span>
      </div>
      <div>
        <span id="order-badge" class="badge"></span>
        <span class="arrow">›</span>
      </div>
    </button>

    <!-- FAVORIS -->
    <button class="menu-btn" id="favoritesBtn">
      <div class="menu-left">
        <span class="icon">❤️</span>
        <span>Mes favoris</span>
      </div>
      <span class="arrow">›</span>
    </button>
    
<button class="menu-btn" id="shopsBtn">
  <div class="menu-left">
    <span class="icon">🏪</span>
    <span>Mes boutiques</span>
  </div>
  <span class="arrow">›</span>
</button>

    <button class="menu-btn" onclick="goWallet()">
      <div class="menu-left">
        <span class="icon">💳</span>
        <span>Mon portefeuille</span>
      </div>
      <span class="arrow">›</span>
    </button>

    <button class="menu-btn" id="changePassBtn" onclick="goChangePassword()">
      <div class="menu-left">
        <span class="icon">🔒</span>
        <span>Modifier mot de passe</span>
      </div>
      <span class="arrow">›</span>
    </button>

    <button class="menu-btn logout" onclick="logout()">
      <div class="menu-left">
        <span class="icon">🚪</span>
        <span>Déconnexion</span>
      </div>
    </button>

  </div>

  <div class="message" id="msgBox"></div>
</div>

<!-- ===================== -->
<!-- MODAL FAVORIS -->
<!-- ===================== -->
<div id="favoritesModal">
  <div id="favoritesPanel">

    <div class="notifHeader">
      <h3>❤️ Favoris</h3>
      <button id="closeFavorites">×</button>
    </div>

    <div class="favoritesTabs">
      <button id="btnFavorisBoutiques">Boutiques</button>
      <button id="btnFavorisProduits">Produits</button>
    </div>

    <div id="favoritesShopsList"></div>
    <div id="favoritesProductsList" style="display:none;"></div>

  </div>
</div>
<!-- ===================== -->
<!-- MODAL MES BOUTIQUES -->
<!-- ===================== -->
<div id="shopsModal">
  <div id="shopsPanel">

    <!-- HEADER -->
    <div class="shopsHeader">
      <h3>🏪 Mes boutiques</h3>
      <button id="closeShops">×</button>
    </div>

    <!-- DASHBOARD GLOBAL -->
    <div class="shopsStats">
      <div class="shopStat">
        <h3 id="shopRevenue">0 FCFA</h3>
        <p>Revenus</p>
      </div>
      <div class="shopStat">
        <h3 id="shopProducts">0</h3>
        <p>Produits</p>
      </div>
      <div class="shopStat">
        <h3 id="shopOrders">0</h3>
        <p>Commandes</p>
      </div>
    </div>

    <!-- LISTE BOUTIQUES -->
    <div id="shopsList"></div>

    <!-- MODAL BOUTIQUE DÉTAILLÉE -->
    <div id="shopFullModal" style="display:none;">
      <h4 id="shopProductsTitle"></h4>
      <div id="productsContainer"></div>
    </div>

  </div>
</div>
<script type="module">

import { supabase } from './supabase.js';

let currentUser=null;

async function loadProfile(){

try{

const { data:{user}, error } = await supabase.auth.getUser();

if(error || !user){

window.location.href="login.html";
return;

}

currentUser=user;

document.getElementById("userEmail").innerText=user.email;

document.getElementById("displayName").innerText=user.email.split("@")[0];

document.getElementById("initialLetter").innerText=user.email.charAt(0).toUpperCase();

document.getElementById("createdAt").innerText=new Date(user.created_at).toLocaleDateString();

const { data:wallet } = await supabase
.from("wallets")
.select("available_balance")
.eq("user_id",user.id)
.single();

document.getElementById("walletBalance").innerText =
(wallet?.available_balance || 0).toLocaleString("fr-FR") + " FCFA";

const { count } = await supabase
.from("wallet_transactions")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id);

document.getElementById("totalTransactions").innerText = count || 0;

await loadNewOrdersCount();

}catch(err){

console.error(err);

}

}

loadProfile();

window.goWallet=function(){

window.location.href="dashboard.html";

}

document.getElementById("btnMesCommandes").addEventListener("click",()=>{

window.location.href="commande.html";

});

window.goChangePassword=async function(){

const btn=document.getElementById("changePassBtn");
const msg=document.getElementById("msgBox");

btn.disabled=true;
btn.innerText="Envoi...";

const { error } = await supabase.auth.resetPasswordForEmail(currentUser.email,{
redirectTo:"https://marketplace2026.github.io/MANG---March-Agricole/reset-password.html"
});

if(error){

msg.innerText="❌ Erreur lors de l'envoi";

}else{

msg.innerText="📩 Email envoyé. Vérifiez votre boîte mail";

}

btn.disabled=false;
btn.innerText="🔒 Modifier mot de passe";

}

window.logout=async function(){

await supabase.auth.signOut();

window.location.href="login.html";

}

async function loadNewOrdersCount(){

if(!currentUser) return;

const { count } = await supabase
.from('orders')
.select('*',{count:'exact',head:true})
.eq('seller_id',currentUser.id)
.eq('status','pending')
.eq('is_seen',false);

const badge=document.getElementById("order-badge");

if(count && count>0){

badge.textContent=count;

}else{

badge.style.display="none";

}

}
const favoritesBtn = document.getElementById("favoritesBtn");
const favoritesModal = document.getElementById("favoritesModal");
const closeFavorites = document.getElementById("closeFavorites");

// OUVRIR
favoritesBtn.onclick = async () => {
  favoritesModal.classList.add("active");
  document.body.style.overflow = "hidden";

  await loadFavoriteNotifications();
  updateFavoritesBadge();
};

// FERMER
closeFavorites.onclick = () => {
  favoritesModal.classList.remove("active");
  document.body.style.overflow = "auto";
};

// CLIQUE EN DEHORS
favoritesModal.addEventListener("click", (e) => {
  if (e.target === favoritesModal) {
    favoritesModal.classList.remove("active");
    document.body.style.overflow = "auto";
  }
});

// =====================
// MODAL BOUTIQUES
// =====================
const shopsBtn = document.getElementById("shopsBtn");
const shopsModal = document.getElementById("shopsModal");
const closeShops = document.getElementById("closeShops");
const shopsList = document.getElementById("shopsList");
const shopFullModal = document.getElementById("shopFullModal");
const shopProductsTitle = document.getElementById("shopProductsTitle");
const productsContainer = document.getElementById("productsContainer");

let currentShop = null;

// OUVRIR MODAL
shopsBtn.onclick = async () => {
  shopsModal.classList.add("active");
  document.body.style.overflow = "hidden";
  await loadSellerDashboard();
  await loadMyShops();
};

// FERMER MODAL
closeShops.onclick = () => {
  shopsModal.classList.remove("active");
  document.body.style.overflow = "auto";
  shopFullModal.style.display = "none";
};

// CLIQUE EN DEHORS
shopsModal.addEventListener("click",(e)=>{
  if(e.target === shopsModal){
    shopsModal.classList.remove("active");
    document.body.style.overflow = "auto";
    shopFullModal.style.display = "none";
  }
});

// =====================
// DASHBOARD GLOBAL
// =====================
async function loadSellerDashboard(){
  if(!currentUser) return;

  // COMMANDES
  const { count: orders } = await supabase
    .from("orders")
    .select("*",{count:"exact",head:true})
    .eq("seller_id", currentUser.id);

  // BOUTIQUES
  const { data: shops } = await supabase
    .from("shops")
    .select("id")
    .eq("owner_id", currentUser.id);

  const shopIds = shops?.map(s => s.id) || [];

  // PRODUITS
  let productCount = 0;
  if(shopIds.length > 0){
    const { count: products } = await supabase
      .from("shop_products")
      .select("*",{count:"exact",head:true})
      .in("shop_id", shopIds);
    productCount = products || 0;
  }

  // REVENUS
  const { data: completedOrders } = await supabase
    .from("orders")
    .select("total_price")
    .eq("seller_id", currentUser.id)
    .eq("status","completed");

  let totalRevenue = 0;
  completedOrders?.forEach(o => totalRevenue += o.total_price || 0);

  document.getElementById("shopRevenue").innerText = totalRevenue.toLocaleString("fr-FR") + " FCFA";
  document.getElementById("shopOrders").innerText = orders || 0;
  document.getElementById("shopProducts").innerText = productCount;
}

// =====================
// CHARGER MES BOUTIQUES
// =====================
async function loadMyShops(){
  if(!currentUser) return;

  const { data: shops, error } = await supabase
    .from("shops")
    .select("*")
    .eq("owner_id", currentUser.id)
    .order("created_at",{ascending:false});

  shopsList.innerHTML = "";

  if(error){
    console.error(error);
    shopsList.innerHTML = "<p style='color:red;'>Erreur chargement boutiques</p>";
    return;
  }

  if(!shops || shops.length === 0){
    shopsList.innerHTML = "<p>Aucune boutique</p>";
    return;
  }

  shops.forEach(shop => {
    const div = document.createElement("div");
    div.className = "shopCard";

    let stars = "";
    if(shop.premium_level === "premium1") stars = "⭐";
    if(shop.premium_level === "premium2") stars = "⭐⭐";
    if(shop.premium_level === "premium3") stars = "⭐⭐⭐";

    div.innerHTML = `
      ${shop.image_url ? `<img src="${shop.image_url}" alt="${shop.name}">` : ""}
      <h4>${shop.name} <span class="premium">${stars}</span></h4>
      <small>${shop.category || "Non catégorisé"}</small>
      <div class="shopActions">
        <button class="openShopBtn">📊 Gérer</button>
        <button class="viewProductsBtn">📦 Produits</button>
        <button class="deleteShopBtn" style="background:#e53935;color:white;">Supprimer</button>
      </div>
    `;

    // OUVRIR BOUTIQUE
    div.querySelector(".openShopBtn").onclick = () => openShop(shop);
    // VOIR PRODUITS
    div.querySelector(".viewProductsBtn").onclick = () => openShop(shop);

    // SUPPRIMER BOUTIQUE
    div.querySelector(".deleteShopBtn").onclick = async () => {
      if(!confirm(`⚠️ Supprimer la boutique "${shop.name}" et tous ses produits ?`)) return;

      try {
        // Supprimer produits images
        const { data: products } = await supabase
          .from("shop_products")
          .select("image_url")
          .eq("shop_id", shop.id);

        if(products?.length > 0){
          const files = products
            .filter(p=>p.image_url)
            .map(p=>p.image_url.split("/").pop());
          if(files.length>0) await supabase.storage.from("products").remove(files);
        }

        // Supprimer image boutique
        if(shop.image_url){
          const shopFile = shop.image_url.split("/").pop();
          await supabase.storage.from("shops").remove([shopFile]);
        }

        // Supprimer boutique
        const { error: deleteError } = await supabase
          .from("shops")
          .delete()
          .eq("id", shop.id);

        if(deleteError) throw deleteError;

        alert(`✅ Boutique "${shop.name}" supprimée`);
        await loadMyShops();

      } catch(err){
        console.error(err);
        alert("Erreur suppression boutique");
      }
    };

    shopsList.appendChild(div);
  });
}

// =====================
// OUVRIR BOUTIQUE
// =====================
async function openShop(shop){
  if(!shop) return;
  currentShop = shop;
  shopFullModal.style.display = "block";
  shopProductsTitle.textContent = "Boutique : " + shop.name;
  await loadShopProducts(shop.id);
}

// =====================
// CHARGER PRODUITS D’UNE BOUTIQUE
// =====================
async function loadShopProducts(shopId){
  if(!shopId) return;

  productsContainer.innerHTML = "";

  const { data: products, error } = await supabase
    .from("shop_products")
    .select("*")
    .eq("shop_id", shopId)
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    productsContainer.innerHTML = "<p style='color:red;'>Erreur chargement produits</p>";
    return;
  }

  if(!products || products.length === 0){
    productsContainer.innerHTML = "<p>Aucun produit disponible</p>";
    return;
  }

  products.forEach(product => {
    const div = document.createElement("div");
    div.className = "productCard";

    div.innerHTML = `
      ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}">` : ""}
      <h4>${product.name}</h4>
      <p>${product.description || ""}</p>
      <p style="font-weight:600;color:#2e7d32;">${formatAvailability(product.availability)}</p>
      <strong>${product.price} FCFA</strong>
      <button class="deleteProductBtn" style="background:#e53935;color:white;margin-top:6px;">Supprimer</button>
    `;

    div.querySelector(".deleteProductBtn").onclick = async () => {
      if(!confirm(`⚠️ Supprimer le produit "${product.name}" ?`)) return;

      await supabase.from("shop_products")
        .delete()
        .eq("id", product.id);

      await loadShopProducts(shopId);
    };

    productsContainer.appendChild(div);
  });
}

// =====================
// UTILITAIRE DISPONIBILITÉ
// =====================
function formatAvailability(val){
  if(val === "now") return "Disponible maintenant";
  if(val === "soon") return "Bientôt disponible";
  return val || "Non défini";
      }
</script>

</body>
</html>
