<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil - MANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f8;
color:#333;
}

/* container */

.container{
max-width:480px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* ===================== */
/* HEADER PROFIL */
/* ===================== */

.profile-header{

background:linear-gradient(135deg,#1B8F3A,#2ECC71);

color:white;

border-radius:18px;

padding:35px 20px 28px;

text-align:center;

position:relative;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

/* bouton retour */
.back-btn{

position:absolute;

left:15px;
top:15px;

font-size:30px;

cursor:pointer;

color:white;

}


/* avatar */

.avatar{

width:100px;
height:100px;

border-radius:50%;

background:white;
color:#1B8F3A;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;
font-weight:700;

margin:auto;
margin-bottom:10px;

border:4px solid rgba(255,255,255,0.6);

box-shadow:0 6px 18px rgba(0,0,0,0.2);

}

/* nom utilisateur */

#displayName{
font-size:20px;
margin-top:5px;
}

/* email */

.email{
font-size:13px;
opacity:0.9;
}

/* badge */

.user-badge{

margin-top:6px;

display:inline-block;

background:rgba(255,255,255,0.25);

padding:4px 10px;

border-radius:20px;

font-size:11px;

}

/* ===================== */
/* CARTE STATS */
/* ===================== */

.card{

background:white;

border-radius:14px;

padding:16px;

box-shadow:0 3px 10px rgba(0,0,0,0.06);

}

.stats{

display:flex;

justify-content:space-between;

text-align:center;

}

.stat{
flex:1;
}

.stat h3{

font-size:18px;

color:#1B8F3A;

}

.stat p{

font-size:12px;

color:#777;

}

/* ===================== */
/* MENU */
/* ===================== */

.menu{

display:flex;

flex-direction:column;

gap:6px;

}

.menu-btn{

background:white;

border:none;

padding:15px;

border-radius:12px;

display:flex;

align-items:center;

justify-content:space-between;

font-size:14px;

cursor:pointer;

box-shadow:0 2px 6px rgba(0,0,0,0.05);

transition:0.2s;

}

.menu-btn:hover{

transform:translateY(-1px);

box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.menu-left{

display:flex;

align-items:center;

gap:10px;

}

.icon{

font-size:18px;

color:#1B8F3A;

}

.arrow{

font-size:16px;

color:#bbb;

}

.badge{

background:red;

color:white;

font-size:10px;

padding:2px 6px;

border-radius:20px;

}

.logout{
color:#e53935;
}

.message{

margin-top:10px;

font-size:13px;

text-align:center;

color:#666;

}

#favoritesModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);

  display: none;
  justify-content: flex-end;

  z-index: 9999;
}

#favoritesModal.active{
  display: flex;
}
.notifHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px;

  border-bottom:1px solid #ddd;

  font-weight:600;
  font-size:16px;

  background:#f9f9f9;
}

/* bouton X */
.notifHeader button{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

/* boutons onglets */
.favoritesTabs{
  display:flex;
  gap:10px;

  padding:12px;

  border-bottom:1px solid #eee;
}

.favoritesTabs button{
  border:none;
  background:#f5f5f5;

  padding:8px 12px;

  border-radius:8px;

  cursor:pointer;
}

/* liste favoris */
#favoritesShopsList,
#favoritesProductsList{
  flex:1;
  overflow-y:auto;

  padding:10px;

  padding-bottom:120px;
}
  
.favorite-shop-btn {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
}

.favorite-shop-btn.active {
  background: #ffe5e5;
  border-color: red;
}
  /* Overlay sombre */
#favoritesPanel{
  width: 100%;
  max-width: 420px;
  height: 100%;

  background: white;

  display: flex;
  flex-direction: column;

  animation: slideIn 0.3s ease;

  box-shadow: -10px 0 40px rgba(0,0,0,0.2);
}

@keyframes slideIn{
  from{ transform: translateX(100%); }
  to{ transform: translateX(0); }
}
  /* MODAL SHOPS */
#shopsModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);

  display: none;
  justify-content: flex-end;

  z-index: 9999;
}

#shopsModal.active{
  display: flex;
}

#shopsPanel{
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: white;

  display: flex;
  flex-direction: column;

  animation: slideIn 0.3s ease;
}

/* HEADER */
.shopsHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:15px;
  border-bottom:1px solid #eee;

  font-weight:600;
}

.shopsHeader button{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

/* STATS */
.shopsStats{
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:#f9f9f9;
}

.shopStat{
  text-align:center;
}

.shopStat h3{
  color:#1B8F3A;
  font-size:16px;
}

.shopStat p{
  font-size:11px;
  color:#777;
}

/* ACTIONS */
.shopsActions{
  display:flex;
  gap:10px;
  padding:12px;
}

.shopsActions button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
}

#createShopBtn{
  background:#1B8F3A;
  color:white;
}

#addProductBtn{
  background:#eee;
}

/* LISTE */
#shopsList{
  flex:1;
  overflow-y:auto;
  padding:12px;
  padding-bottom:120px;
}

/* CARD BOUTIQUE */
.shopCard{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;

  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.shopCard h4{
  margin-bottom:5px;
}

.shopCard button{
  margin-top:8px;
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#f1f1f1;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="profile-header">

<span class="back-btn" onclick="window.location.href='index.html'">←</span>

<div class="avatar" id="initialLetter">U</div>

<h3 id="displayName">Utilisateur</h3>

<div class="email" id="userEmail"></div>

<div class="user-badge">Utilisateur MANG</div>

</div>

<!-- STATISTIQUES -->

<div class="card">

<div class="stats">

<div class="stat">
<h3 id="walletBalance">0 FCFA</h3>
<p>Solde</p>
</div>

<div class="stat">
<h3 id="totalTransactions">0</h3>
<p>Transactions</p>
</div>

<div class="stat">
<h3 id="createdAt"></h3>
<p>Inscription</p>
</div>

</div>

</div>


    <!-- MENU -->
<div class="card">
  <div class="menu">

    <button id="btnMesCommandes" class="menu-btn">
      <div class="menu-left">
        <span class="icon">📦</span>
        <span>Mes commandes</span>
      </div>
      <div>
        <span id="order-badge" class="badge"></span>
        <span class="arrow">›</span>
      </div>
    </button>

    <!-- FAVORIS -->
    <button class="menu-btn" id="favoritesBtn">
      <div class="menu-left">
        <span class="icon">❤️</span>
        <span>Mes favoris</span>
      </div>
      <span class="arrow">›</span>
    </button>
    
<button class="menu-btn" id="shopsBtn">
  <div class="menu-left">
    <span class="icon">🏪</span>
    <span>Mes boutiques</span>
  </div>
  <span class="arrow">›</span>
</button>

    <button class="menu-btn" onclick="goWallet()">
      <div class="menu-left">
        <span class="icon">💳</span>
        <span>Mon portefeuille</span>
      </div>
      <span class="arrow">›</span>
    </button>

    <button class="menu-btn" id="changePassBtn" onclick="goChangePassword()">
      <div class="menu-left">
        <span class="icon">🔒</span>
        <span>Modifier mot de passe</span>
      </div>
      <span class="arrow">›</span>
    </button>

    <button class="menu-btn logout" onclick="logout()">
      <div class="menu-left">
        <span class="icon">🚪</span>
        <span>Déconnexion</span>
      </div>
    </button>

  </div>

  <div class="message" id="msgBox"></div>
</div>

<!-- ===================== -->
<!-- MODAL FAVORIS -->
<!-- ===================== -->
<div id="favoritesModal">
  <div id="favoritesPanel">

    <div class="notifHeader">
      <h3>❤️ Favoris</h3>
      <button id="closeFavorites">×</button>
    </div>

    <div class="favoritesTabs">
      <button id="btnFavorisBoutiques">Boutiques</button>
      <button id="btnFavorisProduits">Produits</button>
    </div>

    <div id="favoritesShopsList"></div>
    <div id="favoritesProductsList" style="display:none;"></div>

  </div>
</div>

  <!-- ===================== -->
<!-- MODAL MES BOUTIQUES -->
<!-- ===================== -->
<div id="shopsModal">
  <div id="shopsPanel">

    <!-- HEADER -->
    <div class="shopsHeader">
      <h3>🏪 Mes boutiques</h3>
      <button id="closeShops">×</button>
    </div>

    <!-- DASHBOARD -->
    <div class="shopsStats">

      <div class="shopStat">
        <h3 id="shopRevenue">0 FCFA</h3>
        <p>Revenus</p>
      </div>

      <div class="shopStat">
        <h3 id="shopProducts">0</h3>
        <p>Produits</p>
      </div>

      <div class="shopStat">
        <h3 id="shopOrders">0</h3>
        <p>Commandes</p>
      </div>

    </div>

    <!-- ACTIONS -->
    <div class="shopsActions">
      <button id="createShopBtn">➕ Créer boutique</button>
      <button id="addProductBtn">📦 Ajouter produit</button>
    </div>

    <!-- LISTE -->
    <div id="shopsList"></div>

  </div>
</div>

<script type="module">

import { supabase } from './supabase.js';

let currentUser=null;

async function loadProfile(){

try{

const { data:{user}, error } = await supabase.auth.getUser();

if(error || !user){

window.location.href="login.html";
return;

}

currentUser=user;

document.getElementById("userEmail").innerText=user.email;

document.getElementById("displayName").innerText=user.email.split("@")[0];

document.getElementById("initialLetter").innerText=user.email.charAt(0).toUpperCase();

document.getElementById("createdAt").innerText=new Date(user.created_at).toLocaleDateString();

const { data:wallet } = await supabase
.from("wallets")
.select("available_balance")
.eq("user_id",user.id)
.single();

document.getElementById("walletBalance").innerText =
(wallet?.available_balance || 0).toLocaleString("fr-FR") + " FCFA";

const { count } = await supabase
.from("wallet_transactions")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id);

document.getElementById("totalTransactions").innerText = count || 0;

await loadNewOrdersCount();

}catch(err){

console.error(err);

}

}

loadProfile();

window.goWallet=function(){

window.location.href="dashboard.html";

}

document.getElementById("btnMesCommandes").addEventListener("click",()=>{

window.location.href="commande.html";

});

window.goChangePassword=async function(){

const btn=document.getElementById("changePassBtn");
const msg=document.getElementById("msgBox");

btn.disabled=true;
btn.innerText="Envoi...";

const { error } = await supabase.auth.resetPasswordForEmail(currentUser.email,{
redirectTo:"https://marketplace2026.github.io/MANG---March-Agricole/reset-password.html"
});

if(error){

msg.innerText="❌ Erreur lors de l'envoi";

}else{

msg.innerText="📩 Email envoyé. Vérifiez votre boîte mail";

}

btn.disabled=false;
btn.innerText="🔒 Modifier mot de passe";

}

window.logout=async function(){

await supabase.auth.signOut();

window.location.href="login.html";

}

async function loadNewOrdersCount(){

if(!currentUser) return;

const { count } = await supabase
.from('orders')
.select('*',{count:'exact',head:true})
.eq('seller_id',currentUser.id)
.eq('status','pending')
.eq('is_seen',false);

const badge=document.getElementById("order-badge");

if(count && count>0){

badge.textContent=count;

}else{

badge.style.display="none";

}

}
const favoritesBtn = document.getElementById("favoritesBtn");
const favoritesModal = document.getElementById("favoritesModal");
const closeFavorites = document.getElementById("closeFavorites");

// OUVRIR
favoritesBtn.onclick = async () => {
  favoritesModal.classList.add("active");
  document.body.style.overflow = "hidden";

  await loadFavoriteNotifications();
  updateFavoritesBadge();
};

// FERMER
closeFavorites.onclick = () => {
  favoritesModal.classList.remove("active");
  document.body.style.overflow = "auto";
};

// CLIQUE EN DEHORS
favoritesModal.addEventListener("click", (e) => {
  if (e.target === favoritesModal) {
    favoritesModal.classList.remove("active");
    document.body.style.overflow = "auto";
  }
});

  // =====================
// MODAL BOUTIQUES
// =====================

const shopsBtn = document.getElementById("shopsBtn");
const shopsModal = document.getElementById("shopsModal");
const closeShops = document.getElementById("closeShops");

// OUVRIR
shopsBtn.onclick = async () => {
  shopsModal.classList.add("active");
  document.body.style.overflow = "hidden";

  await loadSellerDashboard();
  await loadUserShops();
};

// FERMER
closeShops.onclick = () => {
  shopsModal.classList.remove("active");
  document.body.style.overflow = "auto";
};

// CLICK OUTSIDE
shopsModal.addEventListener("click",(e)=>{
  if(e.target === shopsModal){
    shopsModal.classList.remove("active");
    document.body.style.overflow = "auto";
  }
});

// =====================
// DASHBOARD VENDEUR
// =====================

async function loadSellerDashboard(){

  if(!currentUser) return;

  // PRODUITS
  const { count:products } = await supabase
    .from("products")
    .select("*",{count:"exact",head:true})
    .eq("user_id",currentUser.id);

  document.getElementById("shopProducts").innerText = products || 0;

  // COMMANDES
  const { count:orders } = await supabase
    .from("orders")
    .select("*",{count:"exact",head:true})
    .eq("seller_id",currentUser.id);

  document.getElementById("shopOrders").innerText = orders || 0;

  // REVENUS
  const { data } = await supabase
    .from("orders")
    .select("total_price")
    .eq("seller_id",currentUser.id)
    .eq("status","completed");

  let total = 0;
  data?.forEach(o => total += o.total_price || 0);

  document.getElementById("shopRevenue").innerText =
    total.toLocaleString("fr-FR") + " FCFA";
}

// =====================
// CHARGER BOUTIQUES
// =====================

async function loadUserShops(){

  const { data } = await supabase
    .from("shops")
    .select("*")
    .eq("user_id",currentUser.id);

  const container = document.getElementById("shopsList");

  if(!data || data.length === 0){
    container.innerHTML = "<p>Aucune boutique</p>";
    return;
  }

  container.innerHTML = data.map(shop=>`

    <div class="shopCard">
      <h4>${shop.name}</h4>
      <p style="font-size:12px;color:#777;">
        ${shop.description || ""}
      </p>

      <button onclick="openShop('${shop.id}')">
        Gérer boutique
      </button>
    </div>

  `).join("");
}

// =====================
// ACTIONS
// =====================

document.getElementById("createShopBtn").onclick = () => {
  window.location.href="create-shop.html";
};

document.getElementById("addProductBtn").onclick = () => {
  window.location.href="add-product.html";
};

// =====================
// OUVRIR UNE BOUTIQUE
// =====================

window.openShop = function(id){
  window.location.href = "shop-dashboard.html?id="+id;
};
</script>

</body>
</html>
