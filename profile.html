<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil - MANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f8;
color:#333;
}

/* container */

.container{
max-width:480px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* ===================== */
/* HEADER PROFIL */
/* ===================== */

.profile-header{

background:linear-gradient(135deg,#1B8F3A,#2ECC71);

color:white;

border-radius:18px;

padding:35px 20px 28px;

text-align:center;

position:relative;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

/* bouton retour */
.back-btn{

position:absolute;

left:15px;
top:15px;

font-size:30px;

cursor:pointer;

color:white;

}


/* avatar */

.avatar{

width:100px;
height:100px;

border-radius:50%;

background:white;
color:#1B8F3A;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;
font-weight:700;

margin:auto;
margin-bottom:10px;

border:4px solid rgba(255,255,255,0.6);

box-shadow:0 6px 18px rgba(0,0,0,0.2);

}

/* nom utilisateur */

#displayName{
font-size:20px;
margin-top:5px;
}

/* email */

.email{
font-size:13px;
opacity:0.9;
}

/* badge */

.user-badge{

margin-top:6px;

display:inline-block;

background:rgba(255,255,255,0.25);

padding:4px 10px;

border-radius:20px;

font-size:11px;

}

/* ===================== */
/* CARTE STATS */
/* ===================== */

.card{

background:white;

border-radius:14px;

padding:16px;

box-shadow:0 3px 10px rgba(0,0,0,0.06);

}

.stats{

display:flex;

justify-content:space-between;

text-align:center;

}

.stat{
flex:1;
}

.stat h3{

font-size:18px;

color:#1B8F3A;

}

.stat p{

font-size:12px;

color:#777;

}

/* ===================== */
/* MENU */
/* ===================== */

.menu{

display:flex;

flex-direction:column;

gap:6px;

}

.menu-btn{

background:white;

border:none;

padding:15px;

border-radius:12px;

display:flex;

align-items:center;

justify-content:space-between;

font-size:14px;

cursor:pointer;

box-shadow:0 2px 6px rgba(0,0,0,0.05);

transition:0.2s;

}

.menu-btn:hover{

transform:translateY(-1px);

box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.menu-left{

display:flex;

align-items:center;

gap:10px;

}

.icon{

font-size:18px;

color:#1B8F3A;

}

.arrow{

font-size:16px;

color:#bbb;

}

.badge{

background:red;

color:white;

font-size:10px;

padding:2px 6px;

border-radius:20px;

}

.logout{
color:#e53935;
}

.message{

margin-top:10px;

font-size:13px;

text-align:center;

color:#666;

}

#favoritesModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);

  display: none;
  justify-content: flex-end;

  z-index: 9999;
}

#favoritesModal.active{
  display: flex;
}
.notifHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px;

  border-bottom:1px solid #ddd;

  font-weight:600;
  font-size:16px;

  background:#f9f9f9;
}

/* bouton X */
.notifHeader button{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

/* boutons onglets */
.favoritesTabs{
  display:flex;
  gap:10px;

  padding:12px;

  border-bottom:1px solid #eee;
}

.favoritesTabs button{
  border:none;
  background:#f5f5f5;

  padding:8px 12px;

  border-radius:8px;

  cursor:pointer;
}

/* liste favoris */
#favoritesShopsList,
#favoritesProductsList{
  flex:1;
  overflow-y:auto;

  padding:10px;

  padding-bottom:120px;
}
  
.favorite-shop-btn {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
}

.favorite-shop-btn.active {
  background: #ffe5e5;
  border-color: red;
}
  /* Overlay sombre */
#favoritesPanel{
  width: 100%;
  max-width: 420px;
  height: 100%;

  background: white;

  display: flex;
  flex-direction: column;

  animation: slideIn 0.3s ease;

  box-shadow: -10px 0 40px rgba(0,0,0,0.2);
}

@keyframes slideIn{
  from{ transform: translateX(100%); }
  to{ transform: translateX(0); }
}


/* ===================== */
/* MODAL BOUTIQUES */
/* ===================== */
#shopsModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: flex-end;
  z-index: 9999;
}

#shopsModal.active {
  display: flex;
}

#shopsPanel {
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: white;
  display: flex;
  flex-direction: column;
  animation: slideIn 0.3s ease;
  overflow-y: auto;
  padding-bottom: 20px;
}

/* HEADER */
.shopsHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  border-bottom: 1px solid #eee;
  font-weight: 600;
}

.shopsHeader button {
  font-size: 22px;
  background: none;
  border: none;
  cursor: pointer;
}

/* DASHBOARD GLOBAL */
.shopsStats {
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: #f9f9f9;
}

.shopStat {
  text-align: center;
}

.shopStat h3 {
  color: #1B8F3A;
  font-size: 16px;
}

.shopStat p {
  font-size: 11px;
  color: #777;
}

/* SCROLL HORIZONTAL */
.horizontalScroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 12px;
  scroll-behavior: smooth;
}

.horizontalScroll::-webkit-scrollbar {
  height: 6px;
}

.horizontalScroll::-webkit-scrollbar-thumb {
  background-color: rgba(0,0,0,0.2);
  border-radius: 3px;
}

/* CARTE BOUTIQUE */
.shopCard {
  flex: 0 0 200px; /* largeur fixe pour scroll horizontal */
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  transition: transform 0.2s;
  position: relative;
}

.shopCard:hover {
  transform: translateY(-5px);
}

/* Badge premium */
.shopCard .premium {
  color: gold;
}

/* Image boutique */
.shopCard img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 6px;
}

.shopCard h4 {
  margin-bottom: 4px;
  font-size: 16px;
}

.shopCard small {
  font-size: 12px;
  color: #555;
  display: block;
  margin-bottom: 6px;
}

.shopCard .shopActions {
  display: flex;
  gap: 4px;
}

.shopCard .shopActions button {
  flex: 1;
  padding: 6px 0;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  background: #f1f1f1;
}

/* MODAL BOUTIQUE DÉTAILLÉE */
#shopFullModal {
  margin-top: 10px;
  background: #fafafa;
  border-radius: 12px;
  padding: 12px;
}

.shopFullHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.shopFullHeader h4 {
  font-size: 16px;
}

.shopFullHeader button {
  font-size: 20px;
  background: none;
  border: none;
  cursor: pointer;
}

/* CARTE PRODUIT */
.productCard {
  flex: 0 0 180px;
  background: white;
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  transition: transform 0.2s;
}

.productCard:hover {
  transform: translateY(-3px);
}

.productCard img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 4px;
}

.productCard h4 {
  font-size: 14px;
  margin-bottom: 3px;
}

.productCard p {
  font-size: 12px;
  color: #555;
  margin-bottom: 4px;
}

.productCard strong {
  color: #1B8F3A;
}

.productCard button {
  margin-top: 4px;
  width: 100%;
  padding: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  background: #e53935;
  color: white;
}

/* ANIMATION SLIDE */
@keyframes slideIn {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}

</style>

</head>

<script type="module">

import { supabase } from './supabase.js';

let currentUser=null;

async function loadProfile(){

try{

const { data:{user}, error } = await supabase.auth.getUser();

if(error || !user){

window.location.href="login.html";
return;

}

currentUser=user;

document.getElementById("userEmail").innerText=user.email;

document.getElementById("displayName").innerText=user.email.split("@")[0];

document.getElementById("initialLetter").innerText=user.email.charAt(0).toUpperCase();

document.getElementById("createdAt").innerText=new Date(user.created_at).toLocaleDateString();

const { data:wallet } = await supabase
.from("wallets")
.select("available_balance")
.eq("user_id",user.id)
.single();

document.getElementById("walletBalance").innerText =
(wallet?.available_balance || 0).toLocaleString("fr-FR") + " FCFA";

const { count } = await supabase
.from("wallet_transactions")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id);

document.getElementById("totalTransactions").innerText = count || 0;

await loadNewOrdersCount();

}catch(err){

console.error(err);

}

}

loadProfile();

window.goWallet=function(){

window.location.href="dashboard.html";

}

document.getElementById("btnMesCommandes").addEventListener("click",()=>{

window.location.href="commande.html";

});

window.goChangePassword=async function(){

const btn=document.getElementById("changePassBtn");
const msg=document.getElementById("msgBox");

btn.disabled=true;
btn.innerText="Envoi...";

const { error } = await supabase.auth.resetPasswordForEmail(currentUser.email,{
redirectTo:"https://marketplace2026.github.io/MANG---March-Agricole/reset-password.html"
});

if(error){

msg.innerText="❌ Erreur lors de l'envoi";

}else{

msg.innerText="📩 Email envoyé. Vérifiez votre boîte mail";

}

btn.disabled=false;
btn.innerText="🔒 Modifier mot de passe";

}

window.logout=async function(){

await supabase.auth.signOut();

window.location.href="login.html";

}

async function loadNewOrdersCount(){

if(!currentUser) return;

const { count } = await supabase
.from('orders')
.select('*',{count:'exact',head:true})
.eq('seller_id',currentUser.id)
.eq('status','pending')
.eq('is_seen',false);

const badge=document.getElementById("order-badge");

if(count && count>0){

badge.textContent=count;

}else{

badge.style.display="none";

}

}

async function loadFavoriteShops() {
  favoritesShopsList.style.display = "block";
  favoritesProductsList.style.display = "none";
  favoritesShopsList.innerHTML = "<p>Chargement...</p>";

  if (!currentUser || !currentUser.id) {
    favoritesShopsList.innerHTML = "<p>Utilisateur non connecté.</p>";
    return;
  }

  const { data: favs, error: favError } = await supabase
    .from("favorite_shops")
    .select("shop_id")
    .eq("user_id", currentUser.id);

  if (favError) {
    console.error(favError);
    favoritesShopsList.innerHTML = "<p>Erreur chargement favoris.</p>";
    return;
  }

  if (!favs || favs.length === 0) {
    favoritesShopsList.innerHTML = "<p>Aucune boutique suivie.</p>";
    return;
  }

  const shopIds = favs.map(f => f.shop_id);

  const { data: shops, error: shopError } = await supabase
    .from("shops")
    .select("*")
    .in("id", shopIds);

  if (shopError) {
    console.error(shopError);
    favoritesShopsList.innerHTML = "<p>Erreur chargement boutiques.</p>";
    return;
  }

  favoritesShopsList.innerHTML = "";

  `;

  // Hover effect
  div.onmouseenter = () => {

    div.style.boxShadow = "0 4px 16px rgba(0,0,0,0.12)";
  };
  div.onmouseleave = () => {
    div.style.transform = "translateY(0)";
    div.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)";
  };

  div.innerHTML = `
    <img src="${shop.image_url || 'https://via.placeholder.com/80'}"
         style="
           width:80px;
           height:60px;
           border-radius:10px;
           object-fit:cover;
           flex-shrink:0;
         ">
    <div style="display:flex; flex-direction:column; justify-content:space-between; flex:1;">
      <strong style="font-size:16px; color:#1B8F3A;">${shop.name}</strong>
      <p style="
        font-size:14px;
        color:#666;
        margin:4px 0 0 0;
      ">${shop.description || ""}</p>
    </div>
  `;

  div.onclick = async () => {
    favoritesModal.style.display = "none";
    await openShop(shop); // ta fonction pour ouvrir la boutique
  };

  favoritesShopsList.appendChild(div);
});

      font-size:14px;
      color:#2e8b57;
      font-weight:600;
      margin:4px 0 0 0;
    ">${product.price || "-"} FCFA</p>
  </div>
`;
    div.onclick = async () => {
      favoritesModal.style.display = "none";

      // Récupérer la boutique complète du produit
      const { data: shopData, error: shopError } = await supabase
        .from("shops")
        .select("*")
        .eq("id", product.shop_id)
        .single();

      if (shopError || !shopData) {
        console.error(shopError);
        alert("Impossible de charger la boutique de ce produit.");
        return;
      }

      await openShop(shopData); // Ouvrir la boutique du produit
    };

    favoritesProductsList.appendChild(div);
  });
      }
// =====================
// MES BOUTIQUES - SCRIPT
// =====================
const shopsBtn = document.getElementById("shopsBtn");
const shopsModal = document.getElementById("shopsModal");
const closeShops = document.getElementById("closeShops");
const shopFullModal = document.getElementById("shopFullModal");
const closeShopDetail = document.getElementById("closeShopDetail");

let currentShop = null;

// OUVRIR MODAL BOUTIQUES
shopsBtn.onclick = async () => {
  shopsModal.classList.add("active");
  document.body.style.overflow = "hidden";

  await loadSellerDashboard();
  await loadMyShops();
};

// FERMER MODAL
closeShops.onclick = () => {
  shopsModal.classList.remove("active");
  document.body.style.overflow = "auto";
};

// FERMER DETAIL BOUTIQUE
closeShopDetail.onclick = () => {
  shopFullModal.style.display = "none";
  currentShop = null;
};

// CLICK OUTSIDE
shopsModal.addEventListener("click", (e) => {
  if (e.target === shopsModal) {
    shopsModal.classList.remove("active");
    document.body.style.overflow = "auto";
  }
});

// DASHBOARD GLOBAL
async function loadSellerDashboard() {
  if (!currentUser) return;

  const { count: products } = await supabase
    .from("shop_products")
    .select("*", { count: "exact", head: true })
    .eq("owner_id", currentUser.id);

  const { count: orders } = await supabase
    .from("orders")
    .select("*", { count: "exact", head: true })
    .eq("seller_id", currentUser.id);

  const { data } = await supabase
    .from("orders")
    .select("total_price")
    .eq("seller_id", currentUser.id)
    .eq("status", "completed");

  const total = data?.reduce((acc, o) => acc + (o.total_price || 0), 0) || 0;

  document.getElementById("shopProducts").innerText = products || 0;
  document.getElementById("shopOrders").innerText = orders || 0;
  document.getElementById("shopRevenue").innerText = total.toLocaleString("fr-FR") + " FCFA";
}

  // =====================
// CHARGER LISTE BOUTIQUES
// =====================
async function loadMyShops() {
  if (!currentUser) return;

  const { data: shops, error } = await supabase
    .from("shops")
    .select("*")
    .eq("owner_id", currentUser.id)
    .order("created_at", { ascending: false });

  const container = document.getElementById("shopsList");
  container.innerHTML = "";

  if (error) {
    console.error("❌ Erreur chargement boutiques :", error);
    return container.innerHTML = "<p style='color:red;'>Erreur chargement boutiques</p>";
  }

  if (!shops || shops.length === 0) {
    return container.innerHTML = "<p>Aucune boutique</p>";
  }

  shops.forEach(shop => {
    const div = document.createElement("div");
    div.className = "shopCard";

    // Badge premium
    let stars = "";
    if (shop.premium_level === "premium1") stars = "⭐";
    if (shop.premium_level === "premium2") stars = "⭐⭐";
    if (shop.premium_level === "premium3") stars = "⭐⭐⭐";

    div.innerHTML = `
      ${shop.image_url ? `<img src="${shop.image_url}" alt="${shop.name}">` : ""}
      <h4>${shop.name} <span class="premium">${stars}</span></h4>
      <small>${shop.category || "Non catégorisé"}</small>
      <div class="shopActions">
        <button class="openShopBtn">📊 Gérer</button>
        <button class="deleteShopBtn">🗑 Supprimer</button>
      </div>
    `;

    // OUVRIR BOUTIQUE
    div.querySelector(".openShopBtn").onclick = async () => {
      currentShop = shop;
      document.getElementById("shopProductsTitle").innerText = "Boutique : " + shop.name;
      shopFullModal.style.display = "block";
      await loadShopProducts(shop.id); // produits seront chargés ici
    };

    // SUPPRIMER BOUTIQUE
    div.querySelector(".deleteShopBtn").onclick = async () => {
      if (!confirm(`⚠️ Supprimer la boutique "${shop.name}" et tous ses produits ?`)) return;

      try {
        // Supprimer images produits
        const { data: products } = await supabase
          .from("shop_products")
          .select("image_url")
          .eq("shop_id", shop.id);

        if (products?.length > 0) {
          const productFiles = products
            .filter(p => p.image_url)
            .map(p => p.image_url.split("/").pop());
          if (productFiles.length > 0) {
            await supabase.storage.from("products").remove(productFiles);
          }
        }

        // Supprimer image boutique
        if (shop.image_url) {
          const shopFile = shop.image_url.split("/").pop();
          await supabase.storage.from("shops").remove([shopFile]);
        }

        // Supprimer boutique
        const { error: deleteError } = await supabase
          .from("shops")
          .delete()
          .eq("id", shop.id);

        if (deleteError) throw deleteError;

        // Notification
        await supabase.from("notif_market").insert({
          user_id: currentUser.id,
          actor_id: currentUser.id,
          type: "shop",
          title: "🗑 Boutique supprimée",
          message: `La boutique "${shop.name}" a été supprimée`,
          target_id: shop.id,
          link: "/shops",
          is_read: false
        });

        alert("✅ Boutique supprimée avec succès");
        await loadMyShops();
        shopFullModal.style.display = "none";

      } catch (err) {
        console.error("Erreur suppression boutique :", err);
        alert("Erreur inattendue lors de la suppression");
      }
    };

    container.appendChild(div);
  });
}


// =====================
// CHARGER PRODUITS BOUTIQUE
// =====================
async function loadShopProducts(shopId) {
  const productsContainer = document.getElementById("productsContainer");
  productsContainer.innerHTML = "";
  if (!shopId) return;

  const { data: products, error } = await supabase
    .from("shop_products")
    .select("*")
    .eq("shop_id", shopId)
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Erreur chargement produits :", error);
    return productsContainer.innerHTML = "<p style='color:red;'>Erreur chargement produits</p>";
  }

  if (!products || products.length === 0) {
    return productsContainer.innerHTML = "<p>Aucun produit disponible</p>";
  }

  products.forEach(product => {
    const div = document.createElement("div");
    div.className = "productCard";

    div.innerHTML = `
      ${product.image_url ? `<img src="${product.image_url}" alt="${product.name}">` : ""}
      <h4>${product.name}</h4>
      <p>${product.description || ""}</p>
      <strong>${product.price} FCFA</strong>
      <button class="deleteProductBtn">🗑 Supprimer</button>
    `;

    // ===== SUPPRIMER PRODUIT =====
    div.querySelector(".deleteProductBtn").onclick = async () => {
      if (!confirm(`⚠️ Supprimer le produit "${product.name}" ?`)) return;

      try {
        // 1️⃣ Supprimer le produit dans la base
        const { error: deleteError } = await supabase
          .from("shop_products")
          .delete()
          .eq("id", product.id);

        if (deleteError) throw deleteError;

        // 2️⃣ Supprimer l'image du storage si elle existe
        if (product.image_url) {
          const fileName = product.image_url.split("/").pop();
          await supabase.storage.from("products").remove([fileName]);
        }

        // 3️⃣ Ajouter notification
        await supabase.from("notif_market").insert({
          user_id: currentUser.id,
          actor_id: currentUser.id,
          type: "product",
          title: "Produit supprimé",
          message: `Le produit "${product.name}" a été supprimé de la boutique`,
          link: `/shop?id=${shopId}`,
          is_read: false
        });

        alert("✅ Produit supprimé avec succès");

        // 4️⃣ Recharger la liste des produits
        await loadShopProducts(shopId);

      } catch (err) {
        console.error("Erreur suppression produit :", err);
        alert("Erreur inattendue lors de la suppression du produit");
      }
    };

    productsContainer.appendChild(div);
  });
}
  
</script>
