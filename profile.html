<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Profil - MANG</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
color:#203a43;
min-height:100vh;
}

/* container */

.container{
max-width:480px;
margin:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

/* cartes */

.card{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

/* profil */

.user-box{
background:#1B8F3A;
color:white;
text-align:center;
position:relative;
padding-top:30px;
}

.back-arrow{
position:absolute;
left:15px;
top:15px;
font-size:22px;
cursor:pointer;
}

/* avatar */

.user-circle{
width:85px;
height:85px;
border-radius:50%;
background:white;
color:#1B8F3A;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 10px auto;
font-weight:700;
}

.email{
font-size:14px;
opacity:0.9;
}

/* stats */

.stat{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.stat:last-child{
border:none;
}

/* actions */

.actions{
display:flex;
flex-direction:column;
gap:10px;
}

/* boutons */

.action-btn{
border:none;
padding:14px;
border-radius:12px;
font-size:14px;
font-weight:600;
cursor:pointer;

display:flex;
align-items:center;
justify-content:space-between;

transition:0.25s;
}

.action-btn:hover{
transform:translateY(-2px);
opacity:0.95;
}

/* styles boutons */

.orders{ background:#2196f3; color:white; }
.favorites{ background:#e91e63; color:white; }
.wallet{ background:#1B8F3A; color:white; }
.password{ background:#ffb300; color:white; }
.logout{ background:#ff5252; color:white; }

/* badge commandes */

#order-badge{
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:20px;
display:none;
}

/* message */

.message{
margin-top:10px;
font-size:13px;
text-align:center;
color:#555;
}

</style></head><body><div class="container"><!-- PROFIL --><div class="card user-box"><span class="back-arrow" onclick="window.location.href='vente.html'">←</span>

<div class="user-circle" id="initialLetter">U</div>
<h3 id="displayName">Utilisateur</h3>
<div class="email" id="userEmail"></div></div><!-- STATISTIQUES --><div class="card"><div class="stat">
<span>Solde actuel</span>
<span id="walletBalance">0 FCFA</span>
</div><div class="stat">
<span>Transactions</span>
<span id="totalTransactions">0</span>
</div><div class="stat">
<span>Date d'inscription</span>
<span id="createdAt"></span>
</div></div><!-- ACTIONS --><div class="card"><div class="actions"><button id="btnMesCommandes" class="action-btn orders">
<span>📦 Mes commandes</span>
<span id="order-badge"></span>
</button><button class="action-btn favorites" onclick="window.location.href='favoris.html'">
❤️ Mes favoris
</button><button class="action-btn wallet" onclick="goWallet()">
💳 Mon portefeuille
</button><button class="action-btn password" id="changePassBtn" onclick="goChangePassword()">
🔒 Modifier mot de passe
</button><button class="action-btn logout" onclick="logout()">
🚪 Déconnexion
</button></div><div class="message" id="msgBox"></div></div></div><script type="module">

import { supabase } from './supabase.js';

let currentUser=null;

async function loadProfile(){

try{

const { data:{user}, error } = await supabase.auth.getUser();

if(error || !user){
window.location.href="login.html";
return;
}

currentUser=user;

document.getElementById("userEmail").innerText=user.email;
document.getElementById("displayName").innerText=user.email.split("@")[0];
document.getElementById("initialLetter").innerText=user.email.charAt(0).toUpperCase();
document.getElementById("createdAt").innerText=new Date(user.created_at).toLocaleDateString();

const { data:wallet } = await supabase
.from("wallets")
.select("available_balance")
.eq("user_id",user.id)
.single();

document.getElementById("walletBalance").innerText=
(wallet?.available_balance || 0).toLocaleString("fr-FR")+" FCFA";

const { count } = await supabase
.from("wallet_transactions")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id);

document.getElementById("totalTransactions").innerText=count || 0;

await loadNewOrdersCount();

}catch(err){
console.error(err);
}

}

loadProfile();

/* portefeuille */

window.goWallet=function(){
window.location.href="dashboard.html";
}

/* commandes */

document.getElementById("btnMesCommandes").addEventListener("click",()=>{
window.location.href="commande.html";
});

/* mot de passe */

window.goChangePassword=async function(){

const btn=document.getElementById("changePassBtn");
const msg=document.getElementById("msgBox");

btn.disabled=true;
btn.innerText="Envoi...";

const { error } = await supabase.auth.resetPasswordForEmail(currentUser.email,{
redirectTo:"https://marketplace2026.github.io/MANG---March-Agricole/reset-password.html"
});

if(error){
msg.innerText="❌ Erreur lors de l'envoi";
}else{
msg.innerText="📩 Email envoyé. Vérifiez votre boîte mail";
}

btn.disabled=false;
btn.innerText="🔒 Modifier mot de passe";

}

/* logout */

window.logout=async function(){

await supabase.auth.signOut();
window.location.href="login.html";

}

/* badge commandes */

async function loadNewOrdersCount(){

if(!currentUser) return;

const { count } = await supabase
.from('orders')
.select('*',{count:'exact',head:true})
.eq('seller_id',currentUser.id)
.eq('status','pending')
.eq('is_seen',false);

const badge=document.getElementById("order-badge");

if(count && count>0){
badge.style.display="inline-block";
badge.textContent=count;
}else{
badge.style.display="none";
}

}

</script></body>
</html>
