<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Profil - MANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
min-height:100vh;
color:#203a43;
}

/* container */
.container{
max-width:480px;
margin:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

/* cartes */
.card{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

/* carte profil */
.user-box{
background:#1B8F3A;
color:white;
text-align:center;
position:relative;
padding-top:30px;
}

/* flèche retour */
.back-arrow{
position:absolute;
left:15px;
top:15px;
font-size:22px;
cursor:pointer;
}

/* cercle utilisateur */
.user-circle{
width:85px;
height:85px;
border-radius:50%;
background:white;
color:#1B8F3A;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 10px auto;
font-weight:700;
}

/* email */
.email{
font-size:14px;
opacity:0.9;
}

/* stats */
.stat{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.stat:last-child{
border:none;
}

/* zone boutons */
.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

/* boutons */
button{
border:none;
padding:12px 16px;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:0.3s;
display:flex;
align-items:center;
gap:6px;
}

button:hover{
transform:translateY(-2px);
opacity:0.95;
}

/* couleurs boutons */
.wallet{
background:#1B8F3A;
color:white;
}

.password{
background:#ffb300;
color:white;
}

.logout{
background:#ff5252;
color:white;
}

.btn-primary{
background:#2196f3;
color:white;
position:relative;
}

/* badge commandes */
#order-badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
display:none;
}

/* message */
.message{
margin-top:10px;
font-size:13px;
text-align:center;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<!-- profil -->
<div class="card user-box">

<span class="back-arrow" onclick="window.location.href='vente.html'">←</span>

<div class="user-circle" id="initialLetter">U</div>
<h3 id="displayName">Utilisateur</h3>
<div class="email" id="userEmail"></div>

</div>

<!-- statistiques -->
<div class="card">

<div class="stat">
<span>Solde actuel</span>
<span id="walletBalance">0 FCFA</span>
</div>

<div class="stat">
<span>Transactions</span>
<span id="totalTransactions">0</span>
</div>

<div class="stat">
<span>Date d'inscription</span>
<span id="createdAt"></span>
</div>

</div>

<!-- actions -->
<div class="card">

<div class="actions">

<button id="btnMesCommandes" class="btn-primary">
📦 Commandes
<span id="order-badge"></span>
</button>

<button class="wallet" onclick="goWallet()">
💳 Portefeuille
</button>

<button class="password" id="changePassBtn" onclick="goChangePassword()">
🔒 Mot de passe
</button>

<button class="logout" onclick="logout()">
🚪 Déconnexion
</button>

</div>

<div class="message" id="msgBox"></div>

</div>

</div>

<script type="module">

import { supabase } from './supabase.js';

let currentUser=null;

async function loadProfile(){

try{

const { data:{user}, error } = await supabase.auth.getUser();

if(error || !user){
window.location.href="login.html";
return;
}

currentUser=user;

document.getElementById("userEmail").innerText=user.email;
document.getElementById("displayName").innerText=user.email.split("@")[0];
document.getElementById("initialLetter").innerText=user.email.charAt(0).toUpperCase();
document.getElementById("createdAt").innerText=new Date(user.created_at).toLocaleDateString();

const { data:wallet } = await supabase
.from("wallets")
.select("available_balance")
.eq("user_id",user.id)
.single();

document.getElementById("walletBalance").innerText=
(wallet?.available_balance || 0).toLocaleString("fr-FR")+" FCFA";

const { count } = await supabase
.from("wallet_transactions")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id);

document.getElementById("totalTransactions").innerText=count || 0;

await loadNewOrdersCount();

}catch(err){
console.error(err);
}

}

loadProfile();

/* portefeuille */
window.goWallet=function(){
window.location.href="dashboard.html";
}

/* commandes */
document.getElementById("btnMesCommandes").addEventListener("click",()=>{
window.location.href="commande.html";
});

/* mot de passe */
window.goChangePassword=async function(){

const btn=document.getElementById("changePassBtn");
const msg=document.getElementById("msgBox");

btn.disabled=true;
btn.innerText="Envoi...";

const { error } = await supabase.auth.resetPasswordForEmail(currentUser.email,{
redirectTo:"https://marketplace2026.github.io/MANG---March-Agricole/reset-password.html"
});

if(error){
msg.innerText="❌ Erreur lors de l'envoi";
}else{
msg.innerText="📩 Email envoyé. Vérifiez votre boîte mail";
}

btn.disabled=false;
btn.innerText="🔒 Mot de passe";

}

/* logout */
window.logout=async function(){

await supabase.auth.signOut();
window.location.href="login.html";

}

/* badge commandes */
async function loadNewOrdersCount(){

if(!currentUser) return;

try{

const { count } = await supabase
.from('orders')
.select('*',{count:'exact',head:true})
.eq('seller_id',currentUser.id)
.eq('status','pending')
.eq('is_seen',false);

const badge=document.getElementById("order-badge");

if(count && count>0){
badge.style.display="inline-block";
badge.textContent=count;
}else{
badge.style.display="none";
}

}catch(err){
console.error(err);
}

}

</script>

</body>
</html>
