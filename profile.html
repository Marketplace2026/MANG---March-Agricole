<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil - MANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f8;
color:#333;
}

/* container */

.container{
max-width:480px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* ===================== */
/* HEADER PROFIL */
/* ===================== */

.profile-header{

background:linear-gradient(135deg,#1B8F3A,#2ECC71);

color:white;

border-radius:18px;

padding:35px 20px 28px;

text-align:center;

position:relative;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

/* bouton retour */
.back-btn{

position:absolute;

left:15px;
top:15px;

font-size:30px;

cursor:pointer;

color:white;

}


/* avatar */

.avatar{

width:100px;
height:100px;

border-radius:50%;

background:white;
color:#1B8F3A;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;
font-weight:700;

margin:auto;
margin-bottom:10px;

border:4px solid rgba(255,255,255,0.6);

box-shadow:0 6px 18px rgba(0,0,0,0.2);

}

/* nom utilisateur */

#displayName{
font-size:20px;
margin-top:5px;
}

/* email */

.email{
font-size:13px;
opacity:0.9;
}

/* badge */

.user-badge{

margin-top:6px;

display:inline-block;

background:rgba(255,255,255,0.25);

padding:4px 10px;

border-radius:20px;

font-size:11px;

}

/* ===================== */
/* CARTE STATS */
/* ===================== */

.card{

background:white;

border-radius:14px;

padding:16px;

box-shadow:0 3px 10px rgba(0,0,0,0.06);

}

.stats{

display:flex;

justify-content:space-between;

text-align:center;

}

.stat{
flex:1;
}

.stat h3{

font-size:18px;

color:#1B8F3A;

}

.stat p{

font-size:12px;

color:#777;

}

/* ===================== */
/* MENU */
/* ===================== */

.menu{

display:flex;

flex-direction:column;

gap:6px;

}

.menu-btn{

background:white;

border:none;

padding:15px;

border-radius:12px;

display:flex;

align-items:center;

justify-content:space-between;

font-size:14px;

cursor:pointer;

box-shadow:0 2px 6px rgba(0,0,0,0.05);

transition:0.2s;

}

.menu-btn:hover{

transform:translateY(-1px);

box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.menu-left{

display:flex;

align-items:center;

gap:10px;

}

.icon{

font-size:18px;

color:#1B8F3A;

}

.arrow{

font-size:16px;

color:#bbb;

}

.badge{

background:red;

color:white;

font-size:10px;

padding:2px 6px;

border-radius:20px;

}

.logout{
color:#e53935;
}

.message{

margin-top:10px;

font-size:13px;

text-align:center;

color:#666;

}


 /* Overlay */
#favoritesModal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  z-index: 1000;
}

/* panneau favoris */
#favoritesPanel{
  position: fixed;

  top: 0;
  right: 0;

  width: 100%;
  max-width: 500px;

  height: calc(100vh - 80px);
  bottom: 120px;

  background: white;
  border-left: 4px solid #2e8b57;

  display: flex;
  flex-direction: column;

  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;

  box-shadow: -3px 0 10px rgba(0,0,0,0.15);
}

/* header identique notifications */
.notifHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px;

  border-bottom:1px solid #ddd;

  font-weight:600;
  font-size:16px;

  background:#f9f9f9;
}

/* bouton X */
.notifHeader button{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
}

/* boutons onglets */
.favoritesTabs{
  display:flex;
  gap:10px;

  padding:12px;

  border-bottom:1px solid #eee;
}

.favoritesTabs button{
  border:none;
  background:#f5f5f5;

  padding:8px 12px;

  border-radius:8px;

  cursor:pointer;
}

/* liste favoris */
#favoritesShopsList,
#favoritesProductsList{
  flex:1;
  overflow-y:auto;

  padding:10px;

  padding-bottom:120px;
}
  
.favorite-shop-btn {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
}

.favorite-shop-btn.active {
  background: #ffe5e5;
  border-color: red;
}
  /* Overlay sombre */
#topShopsOverlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  z-index: 1000;
 }
</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="profile-header">

<span class="back-btn" onclick="window.location.href='index.html'">←</span>

<div class="avatar" id="initialLetter">U</div>

<h3 id="displayName">Utilisateur</h3>

<div class="email" id="userEmail"></div>

<div class="user-badge">Utilisateur MANG</div>

</div>

<!-- STATISTIQUES -->

<div class="card">

<div class="stats">

<div class="stat">
<h3 id="walletBalance">0 FCFA</h3>
<p>Solde</p>
</div>

<div class="stat">
<h3 id="totalTransactions">0</h3>
<p>Transactions</p>
</div>

<div class="stat">
<h3 id="createdAt"></h3>
<p>Inscription</p>
</div>

</div>

</div>

<!-- MENU -->

<div class="card">

<div class="menu">

<button id="btnMesCommandes" class="menu-btn">

<div class="menu-left">
<span class="icon">📦</span>
<span>Mes commandes</span>
</div>

<div>
<span id="order-badge" class="badge"></span>
<span class="arrow">›</span>
</div>

</button>

 
  
  <button  class="menu-left" id="favoritesBtn">
    <div class="icon">❤️</div>
    <span>Mes favoris</span>
    <span class="arrow">›</span>
    
  </button>

<button class="menu-btn" onclick="window.location.href='vente.html'">

<div class="menu-left">
<span class="icon">🏪</span>
<span>Mes boutiques</span>
</div>

<span class="arrow">›</span>

</button>

<button class="menu-btn" onclick="goWallet()">

<div class="menu-left">
<span class="icon">💳</span>
<span>Mon portefeuille</span>
</div>

<span class="arrow">›</span>

</button>

<button class="menu-btn" id="changePassBtn" onclick="goChangePassword()">

<div class="menu-left">
<span class="icon">🔒</span>
<span>Modifier mot de passe</span>
</div>

<span class="arrow">›</span>

</button>

<button class="menu-btn logout" onclick="logout()">

<div class="menu-left">
<span class="icon">🚪</span>
<span>Déconnexion</span>
</div>

  
 <!-- Modal Favoris -->
<div id="favoritesModal">

  <div id="favoritesPanel">

    <div class="notifHeader">
      <h3>❤️ Favoris</h3>
      <button id="closeFavorites">×</button>
    </div>

    <div class="favoritesTabs">
      <button id="btnFavorisBoutiques">Boutiques</button>
      <button id="btnFavorisProduits">Produits</button>
    </div>

    <div id="favoritesShopsList"></div>
    <div id="favoritesProductsList" style="display:none;"></div>

  </div>

</div>

  

</button>

</div>

<div class="message" id="msgBox"></div>

</div>

</div>

<script type="module">

import { supabase } from './supabase.js';

let currentUser=null;

async function loadProfile(){

try{

const { data:{user}, error } = await supabase.auth.getUser();

if(error || !user){

window.location.href="login.html";
return;

}

currentUser=user;

document.getElementById("userEmail").innerText=user.email;

document.getElementById("displayName").innerText=user.email.split("@")[0];

document.getElementById("initialLetter").innerText=user.email.charAt(0).toUpperCase();

document.getElementById("createdAt").innerText=new Date(user.created_at).toLocaleDateString();

const { data:wallet } = await supabase
.from("wallets")
.select("available_balance")
.eq("user_id",user.id)
.single();

document.getElementById("walletBalance").innerText =
(wallet?.available_balance || 0).toLocaleString("fr-FR") + " FCFA";

const { count } = await supabase
.from("wallet_transactions")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id);

document.getElementById("totalTransactions").innerText = count || 0;

await loadNewOrdersCount();

}catch(err){

console.error(err);

}

}

loadProfile();

window.goWallet=function(){

window.location.href="dashboard.html";

}

document.getElementById("btnMesCommandes").addEventListener("click",()=>{

window.location.href="commande.html";

});

window.goChangePassword=async function(){

const btn=document.getElementById("changePassBtn");
const msg=document.getElementById("msgBox");

btn.disabled=true;
btn.innerText="Envoi...";

const { error } = await supabase.auth.resetPasswordForEmail(currentUser.email,{
redirectTo:"https://marketplace2026.github.io/MANG---March-Agricole/reset-password.html"
});

if(error){

msg.innerText="❌ Erreur lors de l'envoi";

}else{

msg.innerText="📩 Email envoyé. Vérifiez votre boîte mail";

}

btn.disabled=false;
btn.innerText="🔒 Modifier mot de passe";

}

window.logout=async function(){

await supabase.auth.signOut();

window.location.href="login.html";

}

async function loadNewOrdersCount(){

if(!currentUser) return;

const { count } = await supabase
.from('orders')
.select('*',{count:'exact',head:true})
.eq('seller_id',currentUser.id)
.eq('status','pending')
.eq('is_seen',false);

const badge=document.getElementById("order-badge");

if(count && count>0){

badge.textContent=count;

}else{

badge.style.display="none";

}

}

// 🔹 RÉFÉRENCES
const favoritesBtn = document.getElementById("favoritesBtn");
const favoritesModal = document.getElementById("favoritesModal");
const closeFavorites = document.getElementById("closeFavorites");
const btnFavorisBoutiques = document.getElementById("btnFavorisBoutiques");
const btnFavorisProduits = document.getElementById("btnFavorisProduits");
const favoritesShopsList = document.getElementById("favoritesShopsList");
const favoritesProductsList = document.getElementById("favoritesProductsList");

// ===================== BOUTON FAVORIS =====================
favoritesBtn.onclick = async () => {
  favoritesModal.style.display = "flex";
  await loadFavoriteNotifications();  // Charge toutes notifications
  updateFavoritesBadge();
};

closeFavorites.onclick = () => {
  favoritesModal.style.display = "none";
};
</script>

</body>
</html>
