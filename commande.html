<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Commandes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f8;
color:#333;
}

/* CONTAINER */

.container{
max-width:480px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* HEADER */

.header{

background:linear-gradient(135deg,#1B8F3A,#2ECC71);

color:white;

border-radius:18px;

padding:20px;

display:flex;

align-items:center;

gap:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}
/* bouton retour */
.back{

font-size:30px;

cursor:pointer;

margin-right:5px;

}
/* avatar */

.avatar{

width:55px;
height:55px;

border-radius:50%;

background:white;

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
font-weight:700;

color:#1B8F3A;

}

/* HEADER INFO */

.header-info h1{

font-size:18px;
font-weight:600;

}

.header-info p{

font-size:13px;
opacity:0.9;

}

/* CARD */

.card{

background:white;

border-radius:14px;

padding:16px;

box-shadow:0 3px 10px rgba(0,0,0,0.06);

}
/* TITRES */

h2{

font-size:16px;

margin-bottom:12px;

color:#1B8F3A;

}

/* GRID */

.orders-grid{

display:flex;

flex-direction:column;

gap:10px;

}

/* ORDER CARD */

.order-card{

background:white;

padding:16px;

border-radius:12px;

box-shadow:0 2px 8px rgba(0,0,0,0.06);

cursor:pointer;

transition:0.2s;

}

.order-card:hover{

transform:translateY(-2px);

}

/* STATUS */

.status-band{

padding:6px 10px;

border-radius:8px;

font-size:12px;

font-weight:600;

margin-bottom:8px;

color:white;

display:inline-block;

}

.status-pending{background:#f39c12;}
.status-accepted{background:#2ecc71;}
.status-refused{background:#e74c3c;}
.status-paid{background:#3498db;}

/* BUTTONS */

.btn{

padding:7px 12px;

border:none;

border-radius:8px;

font-size:13px;

cursor:pointer;

margin-top:8px;

margin-right:6px;

}

.accept-btn{

background:#1B8F3A;

color:white;

}

.refuse-btn{

background:#e74c3c;

color:white;

}

.pay-btn{

background:#2ecc71;

color:white;

}

/* EMPTY */

.empty{

background:white;

padding:20px;

border-radius:12px;

text-align:center;

color:#777;

}

/* MODAL */

.modal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.5);

justify-content:center;

align-items:center;

padding:20px;

z-index:999;

}

.modal-content{

background:white;

padding:22px;

border-radius:14px;

width:100%;

max-width:420px;

}

.modal-content h3{

margin-bottom:10px;

}

.modal-content p{

font-size:14px;

margin:5px 0;

}

.modal-close{

margin-top:12px;

background:#e74c3c;

color:white;

border:none;

padding:7px 12px;

border-radius:6px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="back" onclick="window.location.href='profile.html'">←</div>

<div class="avatar" id="userAvatar">U</div>

<div class="header-info">
  
<h1>Mes Commandes</h1>

<p id="userEmail"></p>

</div>

</div>

<div class="card">

<h2>Mes achats</h2>

<div class="orders-grid" id="buyerOrders"></div>

</div>

<div class="card">

<h2>Commandes reçues</h2>

<div class="orders-grid" id="sellerOrders"></div>

</div>

</div>

<div class="modal" id="orderModal">

<div class="modal-content">

<h3>Détails de la commande</h3>

<div id="orderDetails"></div>

<button class="modal-close" onclick="closeModal()">Fermer</button>

</div>

</div>

<script type="module">

import { supabase } from './supabase.js';

let currentUser = null;
let isProcessing = false;
let allOrders = [];

/* INIT */

async function init(){

const { data:{ session } } = await supabase.auth.getSession();

if(!session){

window.location.href="login.html";

return;

}

currentUser=session.user;

document.getElementById("userEmail").innerText=currentUser.email;

document.getElementById("userAvatar").innerText=currentUser.email.charAt(0).toUpperCase();

await loadOrders();

markOrdersAsSeen();

}

init();

/* LOAD ORDERS */

async function loadOrders(){

const buyerDiv=document.getElementById("buyerOrders");

const sellerDiv=document.getElementById("sellerOrders");

buyerDiv.innerHTML="Chargement...";
sellerDiv.innerHTML="Chargement...";

const { data:buyerOrders } = await supabase
.from("orders")
.select(`
id,amount,quantity,status,created_at,delivery_address,delivery_phone,note,
seller:profiles!orders_seller_id_fkey(id,username,email),
product:shop_products!fk_orders_product(id,name,description)
`)
.eq("buyer_id",currentUser.id)
.order("created_at",{ascending:false});

const { data:sellerOrders } = await supabase
.from("orders")
.select(`
id,amount,quantity,status,created_at,delivery_address,delivery_phone,note,
buyer:profiles!orders_buyer_id_fkey(id,username,email),
product:shop_products!fk_orders_product(id,name,description)
`)
.eq("seller_id",currentUser.id)
.order("created_at",{ascending:false});

buyerDiv.innerHTML="";
sellerDiv.innerHTML="";

allOrders=[...(buyerOrders||[]),...(sellerOrders||[])];

renderOrders(buyerOrders,buyerDiv,true);

renderOrders(sellerOrders,sellerDiv,false);

}

/* RENDER */

function renderOrders(orders,container,isBuyer){

if(!orders || orders.length===0){

container.innerHTML="<div class='empty'>Aucune commande</div>";

return;

}

orders.forEach(order=>{

const status=order.status?.toLowerCase();

let bandClass="status-pending";
let bandText="En attente";

if(status==="accepted"){bandClass="status-accepted";bandText="Acceptée"}
if(status==="refused"){bandClass="status-refused";bandText="Refusée"}
if(status==="paid"){bandClass="status-paid";bandText="Payée"}

let buttons="";

if(!isBuyer && status==="pending"){

buttons=`
<button class="btn accept-btn" onclick="event.stopPropagation();acceptOrder('${order.id}')">Accepter</button>
<button class="btn refuse-btn" onclick="event.stopPropagation();refuseOrder('${order.id}')">Refuser</button>
`;

}

if(isBuyer && status==="accepted"){

buttons=`
<button class="btn pay-btn" onclick="event.stopPropagation();promptPinPay('${order.id}')">Payer</button>
`;

}

const otherUser=isBuyer?order.seller:order.buyer;

container.innerHTML+=`

<div class="order-card" onclick="showDetails('${order.id}')">

<div class="status-band ${bandClass}">${bandText}</div>

<p><strong>Produit :</strong> ${order.product?.name}</p>

<p><strong>${isBuyer?"Vendeur":"Acheteur"} :</strong> ${otherUser?.username}</p>

<p><strong>Montant :</strong> ${order.amount} FCFA</p>

<p><strong>Date :</strong> ${new Date(order.created_at).toLocaleString()}</p>

${buttons}

</div>

`;

});

}

/* ACTIONS */

async function acceptOrder(orderId){

await supabase.rpc("accept_order",{p_order_id:orderId});

alert("Commande acceptée");

loadOrders();

}

async function refuseOrder(orderId){

await supabase.rpc("refuse_order",{p_order_id:orderId});

alert("Commande refusée");

loadOrders();

}

/* PAIEMENT */

async function promptPinPay(orderId){

const pin=prompt("Entrez votre PIN :");

if(!pin) return;

const { data:profile }=await supabase
.from("profiles")
.select("pin")
.eq("id",currentUser.id)
.single();

if(profile.pin!==pin){

alert("PIN incorrect");

return;

}

await payOrder(orderId);

}

async function payOrder(orderId){

const order=allOrders.find(o=>String(o.id)===String(orderId));

const commission=Math.round(order.amount*0.05);

const payToSeller=order.amount-commission;

await supabase.rpc("pay_order_with_commission",{

p_order_id:orderId,
p_amount_to_seller:payToSeller

});

alert("Paiement effectué");

loadOrders();

}

/* MODAL */

function showDetails(orderId){

const order=allOrders.find(o=>String(o.id)===String(orderId));

document.getElementById("orderDetails").innerHTML=`

<p><strong>ID :</strong> ${order.id}</p>

<p><strong>Produit :</strong> ${order.product?.name}</p>

<p><strong>Description :</strong> ${order.product?.description}</p>

<p><strong>Quantité :</strong> ${order.quantity}</p>

<p><strong>Montant :</strong> ${order.amount} FCFA</p>

<p><strong>Status :</strong> ${order.status}</p>

<p><strong>Adresse :</strong> ${order.delivery_address}</p>

<p><strong>Téléphone :</strong> ${order.delivery_phone}</p>

<p><strong>Note :</strong> ${order.note}</p>

<p><strong>Commission :</strong> ${Math.round(order.amount*0.05)} FCFA</p>

`;

document.getElementById("orderModal").style.display="flex";

}

function closeModal(){

document.getElementById("orderModal").style.display="none";

}

async function markOrdersAsSeen(){

await supabase
.from('orders')
.update({is_seen:true})
.eq('seller_id',currentUser.id)
.eq('status','pending')
.eq('is_seen',false);

}

window.acceptOrder=acceptOrder;
window.refuseOrder=refuseOrder;
window.promptPinPay=promptPinPay;
window.showDetails=showDetails;
window.closeModal=closeModal;

</script>

</body>
</html>
