<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille - MANG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= GLOBAL ================= */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: linear-gradient(135deg, #e8f5f1, #d2f4e8);
  color: #1a1a1a;
}

/* ================= CONTAINER ================= */
.wallet-container {
  padding: 15px;
}

/* ================= HEADER ================= */
.wallet-header {
  text-align: center;
  margin-bottom: 15px;
}

.wallet-header h2 {
  margin: 0;
  font-size: 22px;
  color: #0b3d2e;
}

.wallet-header p {
  font-size: 14px;
  opacity: 0.7;
}

/* ================= WALLET CARD ================= */
.wallet-card {
  background: linear-gradient(135deg, #00c853, #009688);
  color: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  margin-bottom: 15px;
  position: relative;
  overflow: hidden;
}

/* glow */
.wallet-card::after {
  content: "";
  position: absolute;
  width: 180px;
  height: 180px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  top: -60px;
  right: -60px;
}

/* ================= BALANCE ================= */
.balance-box p {
  margin: 0;
  font-size: 13px;
  opacity: 0.9;
}

.balance-box h1 {
  margin: 5px 0;
  font-size: 30px;
  font-weight: 700;
}

.balance-box small {
  opacity: 0.8;
}

/* ================= WALLET NUMBER ================= */
.wallet-number {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  font-size: 13px;
  gap: 5px;
}

.wallet-number button {
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 6px 8px;
  width: 70px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

/* ================= ACTIONS ================= */
.actions {
  display: flex;
  justify-content: space-around;
  margin-top: 18px;
}

.actions button {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: white;
  color: #00c853;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.25s;
}

.actions button:hover {
  transform: scale(1.1);
}

/* ================= FILTER ================= */
.filter {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  margin: 10px 0;
  background: white;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* ================= GRAPH ================= */
canvas {
  background: white;
  border-radius: 16px;
  padding: 10px;
  margin-top: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* ================= TRANSACTIONS ================= */
.transaction {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.transaction:hover {
  transform: translateY(-2px);
}

/* ================= AMOUNT ================= */
.amount.plus {
  color: #00c853;
  font-weight: bold;
}

.amount.minus {
  color: #ff5252;
  font-weight: bold;
}

/* ================= MODAL ================= */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  backdrop-filter: blur(4px);
}

/* ================= MODAL BOX ================= */
.modal-box {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  animation: fadeIn 0.3s ease;
}

/* ================= INPUT ================= */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #00c853;
  box-shadow: 0 0 0 2px rgba(0,200,83,0.2);
}

/* ================= RADIO ================= */
.radio-group {
  display: flex;
  gap: 15px;
  margin-top: 10px;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00c853, #009688);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: scale(1.03);
}

/* ================= RECEIVER INFO ================= */
.receiver-info {
  margin-top: 8px;
  font-size: 13px;
  color: #555;
}

/* ================= LOADER ================= */
.loader {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}

/* ================= ANIMATION ================= */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
  }


</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ================= WALLET UI ================= -->

<div class="wallet-container">

  <!-- HEADER -->
  <div class="wallet-header">
    <h2>💰 MANG Wallet</h2>
    <p id="userEmail"></p>
  </div>

  <!-- WALLET -->
  <div id="walletContainer" class="wallet-card" style="display:none">

    <div class="balance-box">
      <p>Solde disponible</p>
      <h1 id="balance">0 FCFA</h1>
      <small id="totalBalance"></small>
    </div>

    <div class="wallet-number">
      <span>Numéro :</span>
      <span id="walletNumber"></span>
      <button onclick="copyWalletNumber()">📋</button>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button onclick="openDeposit()">➕</button>
      <button onclick="openWithdraw()">💸</button>
      <button onclick="openTransferModal()">🔄</button>
    </div>

  </div>

  <!-- FILTRE -->
  <select id="filterType" class="filter">
    <option value="">Toutes les transactions</option>
    <option value="deposit">Recharges</option>
    <option value="transfer">Transferts</option>
    <option value="withdraw">Retraits</option>
  </select>

  <!-- GRAPH -->
  <canvas id="walletChart"></canvas>

  <!-- TRANSACTIONS -->
  <div id="transactions"></div>

</div>


<!-- ================= PIN ================= -->

<div id="createPinModal" class="modal">
  <div class="modal-box">
    <h3>Créer votre PIN</h3>
    <input id="newPin" placeholder="4 chiffres" type="password">
    <button onclick="createPin()">Valider</button>
  </div>
</div>

<div id="verifyPinModal" class="modal">
  <div class="modal-box">
    <h3>Entrer votre PIN</h3>
    <input id="verifyPinInput" type="password">
    <button onclick="verifyPin()">Valider</button>
  </div>
</div>


<!-- ================= DEPOT ================= -->

<div id="depositModal" class="modal">
  <div class="modal-box">
    <h3>Recharger</h3>

    <input id="depositAmount" placeholder="Montant">
    <input id="depositPhone" placeholder="Numéro">

    <div class="radio-group">
      <label><input type="radio" name="depositOperator" value="MTN"> MTN</label>
      <label><input type="radio" name="depositOperator" value="MOOV"> MOOV</label>
    </div>

    <button onclick="submitDeposit()">Payer</button>
    <button onclick="closeDeposit()">Fermer</button>
  </div>
</div>


<!-- ================= RETRAIT ================= -->

<div id="withdrawModal" class="modal">
  <div class="modal-box">
    <h3>Retrait</h3>
    <p>Fonction bientôt disponible</p>
    <button onclick="closeWithdraw()">Fermer</button>
  </div>
</div>


<!-- ================= TRANSFERT ================= -->

<div id="transferModal" class="modal">
  <div class="modal-box">

    <h3>Transfert</h3>

    <input id="receiverNumber" placeholder="Numéro wallet">
    <div id="receiverInfo" class="receiver-info"></div>

    <input id="transferAmount" placeholder="Montant">
    <input id="transferPin" placeholder="PIN" type="password">

    <button onclick="confirmTransfer()">Envoyer</button>
    <button onclick="closeTransferModal()">Fermer</button>

    <div id="transferLoader" class="loader" style="display:none">
      ⏳ Chargement...
    </div>

  </div>
</div>


<!-- ================= DETAILS ================= -->

<div id="detailModal" class="modal">
  <div class="modal-box">
    <div id="transactionDetails"></div>
    <button onclick="closeDetail()">Fermer</button>
  </div>
</div>
<script type="module">

import { supabase } from './supabase.js';

const supabaseUrl = "https://czbqmzclcxitxxfydadl.supabase.co";

let currentUser = null;
let currentProfile = null;
let isProcessingDeposit = false;
  
/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const { data: { user }, error: userError } = await supabase.auth.getUser();
    if (userError || !user) {
      location.href = "login.html";
      return;
    }

    currentUser = user;

    // Afficher email
    const emailEl = document.getElementById("userEmail");
    if (emailEl) emailEl.innerText = currentUser.email;

    // Vérifier PIN
    await checkPinStatus();

    // Charger wallet après
    await loadWallet();

  } catch (err) {
    alert("Erreur lors du chargement : " + err.message);
  }
});


/* ================= PIN SYSTEM ================= */
async function checkPinStatus() {
  let profile;
  try {
    const { data, error } = await supabase
      .from("profiles")
      .select("id, pin")
      .eq("id", currentUser.id)
      .single();

    if (error) throw error;

    profile = data;
  } catch (err) {
    alert("Erreur récupération profil : " + err.message);
    return;
  }

  currentProfile = profile;

  if (!profile.pin) {
    // PIN non défini → créer
    const modal = document.getElementById("createPinModal");
    if (modal) modal.style.display = "flex";
  } else {
    // PIN existant → vérifier
    const modal = document.getElementById("verifyPinModal");
    if (modal) modal.style.display = "flex";
  }
}
async function createPin() {

  const pin = document.getElementById("newPin").value.trim();

  if (pin.length !== 4 || isNaN(pin)) {
    alert("Le PIN doit contenir 4 chiffres");
    return;
  }

  await supabase
    .from("profiles")
    .update({ pin })
    .eq("id", currentUser.id);

  document.getElementById("createPinModal").style.display = "none";

  unlockWallet();
}

function verifyPin() {

  const enteredPin = document.getElementById("verifyPinInput").value.trim();

  if (enteredPin === currentProfile.pin) {
    document.getElementById("verifyPinModal").style.display = "none";
    unlockWallet();
  } else {
    alert("❌ PIN incorrect");
  }
}

function unlockWallet(){
  document.getElementById("walletContainer").style.display = "block";
  loadWallet();
}

          
    
// 🔹 Charger les informations du wallet
async function loadWallet() {
  try {
    const { data, error } = await supabase
      .from("wallets")
      .select("balance, available_balance, escrow_balance, wallet_number")
      .eq("user_id", currentUser.id)
      .single();

    if (error) throw error;
    if (!data) throw new Error("Wallet introuvable");

    // Afficher le solde disponible
    const balanceEl = document.getElementById("balance");
    if (balanceEl) {
      balanceEl.innerText = Number(data.available_balance).toLocaleString("fr-FR") + " FCFA";
    }

    // Afficher le solde total et l'argent bloqué en escrow (optionnel)
    const totalEl = document.getElementById("totalBalance");
    if (totalEl) {
      totalEl.innerText = `Total: ${Number(data.balance).toLocaleString("fr-FR")} FCFA (Escrow: ${Number(data.escrow_balance).toLocaleString("fr-FR")} FCFA)`;
    }

    // Afficher le numéro du wallet
    const walletEl = document.getElementById("walletNumber");
    if (walletEl) walletEl.innerText = data.wallet_number || "Non disponible";

    // Charger l'historique des transactions si fonction disponible
    if (typeof loadTransactions === "function") loadTransactions();

  } catch (err) {
    console.error("Erreur lors du chargement du wallet :", err);
    alert(err.message || "Impossible de charger le wallet");
  }
}

// 🔹 Copier le numéro du wallet
function copyWalletNumber() {
  const el = document.getElementById("walletNumber");
  if (!el) return;

  const number = el.textContent.replace(/\s/g, "");

  if (!number || number === "Non disponible") {
    alert("Numéro indisponible");
    return;
  }

  navigator.clipboard.writeText(number)
    .then(() => alert("Numéro copié !"))
    .catch(() => alert("Impossible de copier le numéro"));
}

// 🔹 Déclarer la fonction globalement pour l'HTML
window.copyWalletNumber = copyWalletNumber;


// =====================================
// RECHARGEMENT FEDA PAY
// =====================================
window.submitDeposit = async function () {

  if (isProcessingDeposit) return;

  const amount = Number(document.getElementById("depositAmount").value);
  const phone = document.getElementById("depositPhone").value.trim();
  const operatorEl = document.querySelector('input[name="depositOperator"]:checked');
  const operator = operatorEl ? operatorEl.value : null;

  if (!amount || amount <= 0) return alert("Montant invalide");
  if (!phone) return alert("Numéro requis");
  if (!operator) return alert("Sélectionnez un opérateur");

  isProcessingDeposit = true;

  try {

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) throw new Error("Session expirée");

    const payload = {
  user_id: currentUser.id,
  type: "deposit",
  operator,
  phone,
  amount,
  currency: "XOF",
  description: "Recharge portefeuille",
  email: currentUser.email,
  first_name: currentUser.user_metadata?.first_name || "Client",
  last_name: currentUser.user_metadata?.last_name || "MANG",

  metadata: {
    user_id: currentUser.id,   // ⭐ indispensable pour le webhook
    operator: operator,
    phone: phone,
    source: "web"
  },

  // FedaPay redirige toujours vers profile.html après paiement ou annulation
      redirect_url: `${window.location.origin}/profile.html?amount=${amount}`
    };  

    const res = await fetch(`${supabaseUrl}/functions/v1/create-transaction`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${session.access_token}`
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const errorText = await res.text();
      throw new Error(errorText || "Erreur serveur");
    }

    const data = await res.json();

    const paymentUrl =
      data?.transaction?.payment_url ||
      data?.transaction?.["v1/transaction"]?.payment_url;

    if (!paymentUrl) throw new Error("Lien de paiement introuvable");

// 🔹 redirection directe dans le même onglet
    window.location.href = paymentUrl;

    closeDeposit();

  } catch (err) {
    console.error("Erreur recharge :", err);
    alert("Erreur : " + err.message);
  } finally {
    isProcessingDeposit = false;
  }

};
      

/* =====================================
   OUVERTURE / FERMETURE MODALES
===================================== */
window.openDeposit = () => {
  document.getElementById("depositModal").style.display = "flex";
};

window.closeDeposit = () => {
  document.getElementById("depositModal").style.display = "none";
};

window.openWithdraw = () => {
  document.getElementById("withdrawModal").style.display = "flex";
};

window.closeWithdraw = () => {
  document.getElementById("withdrawModal").style.display = "none";
};
          
 /* ======================
   TRANSFERT D'ARGENT
===================== */

// 🔹 Ouvrir le modal
function openTransferModal() {
  const modal = document.getElementById("transferModal");
  if (modal) modal.style.display = "flex";
}

// 🔹 Fermer le modal et réinitialiser les champs
function closeTransferModal() {
  const modal = document.getElementById("transferModal");
  if (modal) modal.style.display = "none";

  const info = document.getElementById("receiverInfo");
  if (info) info.innerHTML = "";

  document.getElementById("receiverNumber").value = "";
  document.getElementById("transferAmount").value = "";
  document.getElementById("transferPin").value = "";
}

// 🔹 Bouton pour ouvrir le modal
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("openTransferModal");
  if (btn) btn.addEventListener("click", openTransferModal);
});

// 🔎 Vérification automatique du destinataire
document.addEventListener("input", async (e) => {
  if (e.target.id !== "receiverNumber") return;

  const number = e.target.value.replace(/\s/g, "").trim();
  if (number.length < 6) return;

  try {
    // Récupérer l'utilisateur à partir du wallet_number
    const { data: walletData } = await supabase
      .from("wallets")
      .select("user_id")
      .eq("wallet_number", number)
      .maybeSingle(); // ✅ use maybeSingle pour éviter l'erreur

    const info = document.getElementById("receiverInfo");
    if (!info) return;

    if (!walletData) {
      info.innerHTML = "Numéro introuvable";
      return;
    }

    // Récupérer l'email du destinataire
    const { data: profileData } = await supabase
      .from("profiles")
      .select("email")
      .eq("id", walletData.user_id)
      .maybeSingle();

    if (profileData) {
      info.innerHTML = `Destinataire : <b>${profileData.email}</b>`;
    } else {
      info.innerHTML = "Destinataire trouvé";
    }

  } catch (err) {
    console.error("Erreur vérification destinataire :", err);
  }
});

// 🔹 Confirmer le transfert
async function confirmTransfer() {
  if (!confirm("Êtes-vous sûr de vouloir effectuer ce transfert ?")) return;
  await sendMoney();
}

// 🔹 Envoyer l'argent
async function sendMoney() {
  const loader = document.getElementById("transferLoader");
  if (loader) loader.style.display = "block";

  try {
    const receiverNumber = document.getElementById("receiverNumber")?.value.replace(/\s/g, "").trim();
    const amount = parseFloat(document.getElementById("transferAmount")?.value);
    const pin = document.getElementById("transferPin")?.value.trim();

    if (!receiverNumber || !amount || !pin) throw new Error("Veuillez remplir tous les champs");

    // 🔹 Récupérer l'utilisateur connecté
    const { data: { user }, error: userError } = await supabase.auth.getUser();
    if (userError || !user) throw new Error("Utilisateur non connecté");

    // 🔹 Appel RPC transfer_money
    const { error: rpcError } = await supabase.rpc("transfer_money", {
      sender_uuid: user.id,
      receiver_wallet_number: receiverNumber,
      transfer_amount: amount,
      user_pin: pin
    });

    if (rpcError) throw rpcError;

    // 🔹 Succès
    alert("✅ Transfert réussi !");
    closeTransferModal();
    await loadWallet();
    await loadTransactions(); // recharge les transactions

  } catch (err) {
    alert("❌ " + err.message);
    console.error("Erreur transfert :", err);
  } finally {
    if (loader) loader.style.display = "none";
  }
}

// 🔹 Export des fonctions pour le HTML
window.openTransferModal = openTransferModal;
window.closeTransferModal = closeTransferModal;
window.confirmTransfer = confirmTransfer;
window.sendMoney = sendMoney;

    
/* ======================
LOAD TRANSACTIONS & REALTIME NOTIFICATIONS
====================== */
async function loadTransactions() {
  if (!currentUser) return;

  const filter = document.getElementById("filterType")?.value || "";

  let query = supabase
    .from("wallet_transactions")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending: false });

  if (filter) {
    query = query.ilike("transaction_type", `%${filter}%`);
  }

  const { data, error } = await query;

  const container = document.getElementById("transactions");
  container.innerHTML = "";

  if (error || !data || data.length === 0) {
    container.innerHTML = `<div class="empty">Aucune transaction</div>`;
    renderChart(0, 0);
    return;
  }

  let totalIn = 0;
  let totalOut = 0;

  data.forEach(tx => {
    const amount = Number(tx.amount) || 0;
    const isCredit = amount > 0;
    const absAmount = Math.abs(amount);

    if (isCredit) totalIn += absAmount;
    else totalOut += absAmount;

    const div = document.createElement("div");
    div.className = "transaction";
    div.style.cursor = "pointer";

    div.innerHTML = `
      <div>
        ${getIcon(tx)} <strong>${getTitle(tx)}</strong><br>
        <small>${new Date(tx.created_at).toLocaleString()}</small><br>
        ${statusBadge(tx.status)}
      </div>
      <div class="amount ${isCredit ? "plus" : "minus"}">
        ${isCredit ? "+" : "-"}${formatMoney(absAmount)} FCFA
      </div>
    `;

    div.onclick = () => showTransactionDetail(tx);
    container.appendChild(div);
  });

  renderChart(totalIn, totalOut);
}

/* ======================
ICONS
====================== */
function getIcon(tx) {
  const type = tx.transaction_type?.toLowerCase() || "";
  if (type.includes("deposit")) return "💰";
  if (type.includes("transfer")) return "🔄";
  if (type.includes("withdraw")) return "💸";
  if (type.includes("purchase")) return "🛒";
  if (type.includes("premium")) return "⭐";
  return "💳";
}

/* ======================
NOTIFICATIONS WALLET
====================== */
function showWalletNotification(amount) {
  const notif = document.createElement("div");
  notif.className = "wallet-notif";
  notif.style.position = "fixed";
  notif.style.top = "20px";
  notif.style.right = "20px";
  notif.style.background = "#00c853";
  notif.style.color = "white";
  notif.style.padding = "12px 18px";
  notif.style.borderRadius = "8px";
  notif.style.boxShadow = "0 3px 10px rgba(0,0,0,0.2)";
  notif.style.zIndex = 9999;
  notif.innerHTML = `🔔 Recharge réussie<br>${amount.toLocaleString()} FCFA ont été ajoutés à votre portefeuille`;
  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 5000);
}

/* ======================
ANIMATION SOLDE WALLET
====================== */
function animateWalletIncrease(amount) {
  const walletEl = document.getElementById("walletBalance");
  if (!walletEl) return;
  const current = Number(walletEl.textContent.replace(/\sFCFA/g, '')) || 0;
  const final = current + amount;
  let temp = current;
  const step = Math.ceil(amount / 20);

  const interval = setInterval(() => {
    temp += step;
    if (temp >= final) temp = final;
    walletEl.textContent = temp.toLocaleString() + " FCFA";
    if (temp >= final) clearInterval(interval);
  }, 30);
}

/* ======================
LISTENER REALTIME WALLET
====================== */
function listenWalletRechargeRealtime() {
  supabase
    .channel('wallet_changes')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'wallet_transactions',
    }, (payload) => {
      const tx = payload.new;
      if (tx.user_id === currentUser.id && tx.transaction_type === "transfer") {
        showWalletNotification(Number(tx.amount));
        animateWalletIncrease(Number(tx.amount));
        loadTransactions(); // recharge historique automatiquement
      }
    })
    .subscribe();
}

/* ======================
GET TITLE
====================== */
function getTitle(tx) {
  const type = tx.transaction_type?.toLowerCase() || "";
  const desc = tx.description?.toLowerCase() || "";

  if (type.includes("deposit")) return "Rechargement Mobile Money";
  if (type.includes("withdraw")) return "Retrait Mobile Money";
  if (type.includes("transfer")) return "Transfert utilisateur";
  if (type.includes("purchase")) return tx.description || "Paiement produit";
  if (type.includes("premium") || desc.includes("premium")) return "Abonnement Premium";

  return "Transaction";
}

/* ======================
FORMAT MONEY
====================== */
function formatMoney(amount) {
  return Number(amount || 0).toLocaleString("fr-FR");
}

/* ======================
STATUS BADGE
====================== */
function statusBadge(status) {
  if (!status || status === "completed") return badge("Validé", "#00c853");
  if (status === "pending") return badge("En attente", "#ff9800");
  if (status === "failed") return badge("Échoué", "#ff5252");
  return badge("Validé", "#00c853");
}

function badge(text, color) {
  return `
    <span style="
      background:${color};
      color:white;
      padding:4px 8px;
      border-radius:6px;
      font-size:11px;">
      ${text}
    </span>
  `;
}

          /* ======================
USAGE DESCRIPTION
===================== */
function getUsage(tx) {
  const desc = tx.description?.toLowerCase() || "";
  if (tx.type === "deposit") return "Rechargement de votre portefeuille via Mobile Money.";
  if (tx.type === "withdraw") return "Retrait envoyé vers votre numéro Mobile Money.";
  if (tx.type === "premium" || desc.includes("premium")) return "Paiement pour activation de votre abonnement Premium.";
  if (tx.type === "purchase") return tx.description ? `Paiement pour : ${tx.description}` : "Paiement d’un produit.";
  if (tx.type === "transfer") return "Transfert vers un autre utilisateur.";
  return "Transaction enregistrée.";
          }

          async function generateHash(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
          }

          

          function loadImageBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = function () {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL("image/png"));
    };
    img.onerror = reject;
    img.src = url;
  });
          }

          /* ======================
PDF RECEIPT CLIENT
===================== */
      async function downloadReceiptPDF(id) {
  try {

    const { data: tx, error } = await supabase
      .from("wallet_transactions")
      .select("*")
      .eq("id", id)
      .single();

    if (error || !tx) throw new Error("Transaction introuvable.");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });

    const primary = "#0b3d2e";
    const success = "#16a34a";
    const danger = "#dc2626";

    const isCredit = Number(tx.amount) > 0;
    const accent = isCredit ? success : danger;

    const cleanAmount = Math.abs(Number(tx.amount));

    /* ===== NUMÉRO OFFICIEL ===== */
    const receiptNumber =
      `MANG-${new Date().getFullYear()}-${String(tx.id).padStart(6, "0")}`;

    /* ===== HASH SÉCURITÉ ===== */
    const securityString =
      `${receiptNumber}|${tx.amount}|${tx.created_at}`;
    const hash = await generateHash(securityString);

    /* ===== HEADER FOND ===== */
    doc.setFillColor(primary);
    doc.rect(0, 0, 595, 110, "F");

    /* ===== LOGO ===== */
    const logo = await loadImageBase64("assets/img/logos.png");
    doc.addImage(logo, "PNG", 40, 25, 60, 60);

    doc.setTextColor("#ffffff");
    doc.setFontSize(20);
    doc.text("MANG WALLET", 120, 60);

    doc.setFontSize(11);
    doc.text("Reçu Financier Officiel", 420, 60);

    /* ===== CARTE PRINCIPALE ===== */
    doc.setFillColor("#ffffff");
    doc.roundedRect(40, 150, 515, 400, 18, 18, "F");

    doc.setDrawColor(220);
    doc.roundedRect(40, 150, 515, 400, 18, 18);

    /* ===== TITRE ===== */
    doc.setFontSize(14);
    doc.setTextColor("#333");
    doc.text("Détails de la transaction", 60, 190);

    /* ===== MONTANT CENTRAL ===== */
    doc.setFontSize(36);
    doc.setTextColor(accent);
    doc.text(
      `${isCredit ? "+" : "-"} ${cleanAmount.toLocaleString()} FCFA`,
      297,
      250,
      { align: "center" }
    );

    /* ===== BADGE TYPE ===== */
    doc.setFillColor(accent);
    doc.roundedRect(230, 270, 135, 30, 10, 10, "F");

    doc.setTextColor("#ffffff");
    doc.setFontSize(12);

    const typeLabel =
      tx.type === "transfer_received" ? "TRANSFERT REÇU"
      : tx.type === "transfer_sent" ? "TRANSFERT ENVOYÉ"
      : tx.type?.toUpperCase() || "TRANSACTION";

    doc.text(typeLabel, 297, 290, { align: "center" });

    /* ===== INFOS ===== */
    doc.setTextColor("#333");
    doc.setFontSize(12);

    let y = 330;
    const gap = 32;

    const infoLine = (label, value, offset) => {
      doc.setFont(undefined, "bold");
      doc.text(label, 70, y + gap * offset);
      doc.setFont(undefined, "normal");
      doc.text(String(value), 230, y + gap * offset);
    };

    infoLine("Numéro de reçu :", receiptNumber, 0);
    infoLine("Transaction ID :", tx.id, 1);
    infoLine("Date :", new Date(tx.created_at).toLocaleString(), 2);
    infoLine("Description :", tx.description || "-", 3);

    /* ===== QR CODE ===== */
    const qrCanvas = document.createElement("canvas");

    await new Promise(resolve => {
      new QRCode(qrCanvas, {
        text: `${receiptNumber}|HASH:${hash}`,
        width: 120,
        height: 120,
        correctLevel: QRCode.CorrectLevel.H
      });
      setTimeout(resolve, 250);
    });

    const qrData = qrCanvas.toDataURL("image/png");
    doc.addImage(qrData, "PNG", 400, 390, 120, 120);

    /* ===== CACHET OFFICIEL ===== */
    doc.setDrawColor(primary);
    doc.setLineWidth(2);
    doc.circle(470, 520, 45);

    doc.setFontSize(10);
    doc.setTextColor(primary);
    doc.text("CERTIFIÉ", 470, 525, { align: "center" });

    /* ===== HASH FOOTER ===== */
    doc.setFontSize(6);
    doc.setTextColor("#aaaaaa");
    doc.text(hash, 40, 830);

    doc.setFontSize(9);
    doc.setTextColor("#777");
    doc.text(
      "Document signé électroniquement par MANG Wallet.",
      40,
      800
    );
    doc.text(
      "Toute modification invalide ce reçu.",
      40,
      815
    );

    doc.save(`${receiptNumber}.pdf`);

  } catch (err) {
    console.error(err);
    alert("Erreur génération reçu.");
  }
          }
