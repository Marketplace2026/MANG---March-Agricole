<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communauté MANG</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1B8F3A,#2ECC71);
  color:white;
  text-align:center;
  padding:15px;
  font-weight:700;
  font-size:18px;
}

/* 🔥 TABS */
.tabs{
  display:flex;
  background:white;
  margin:10px;
  border-radius:12px;
  overflow:hidden;
}

.tab{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  font-weight:600;
  color:#555;
}

.tab.active{
  background:#1B8F3A;
  color:white;
}

/* USERS */
.users-section{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

#searchUser{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

.user-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-bottom:1px solid #eee;
}

.user-card img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
}

.user-name{
  font-weight:600;
}

/* CREATE POST */
.create-post{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.create-post img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.create-post input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

.create-post button{
  background:#1B8F3A;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
}

/* POSTS */
#postsContainer{
  padding:10px;
}

.post{
  background:white;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}

.post-top{
  display:flex;
  gap:10px;
}

.post-top img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.post-name{
  font-weight:700;
}

.post-date{
  font-size:11px;
  color:#888;
}

.post-content{
  margin-top:8px;
}

.post-actions{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  border-top:1px solid #eee;
  padding-top:8px;
}

.loader{
  text-align:center;
  padding:20px;
  color:#888;
}

</style>
</head>

<body>

<div class="header">🌿 Communauté MANG</div>

<!-- 🔥 TABS -->
<div class="tabs">
  <div class="tab active" id="tabPosts">📢 Publications</div>
  <div class="tab" id="tabUsers">👥 Membres MANG</div>
</div>

<!-- 👥 USERS -->
<div class="users-section" id="usersSection" style="display:none;">
  <h3>👥 Membres MANG</h3>

  <input type="text" id="searchUser" placeholder="Rechercher un utilisateur...">
  <div id="usersContainer"></div>
</div>

<!-- 📢 POSTS -->
<div id="postsSection">

  <div class="create-post">
    <img id="myAvatar" src="">
    <input type="text" id="postInput" placeholder="Exprimez-vous sur MANG...">
    <button onclick="createPost()">Publier</button>
  </div>

  <div id="postsContainer">
    <div class="loader">Chargement...</div>
  </div>

</div>


  <script type="module">

import { supabase } from './supabase.js';

let currentUser;
let currentPostId = null;

// =======================
// INIT
// =======================
async function init(){
  const { data:{user} } = await supabase.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  loadMyAvatar();
  loadPosts();
  loadUsers();
}

init();


// =======================
// 🔥 TABS
// =======================
const tabPosts = document.getElementById("tabPosts");
const tabUsers = document.getElementById("tabUsers");

const postsSection = document.getElementById("postsSection");
const usersSection = document.getElementById("usersSection");

tabPosts.onclick = () => {
  postsSection.style.display = "block";
  usersSection.style.display = "none";
  tabPosts.classList.add("active");
  tabUsers.classList.remove("active");
};

tabUsers.onclick = () => {
  postsSection.style.display = "none";
  usersSection.style.display = "block";
  tabUsers.classList.add("active");
  tabPosts.classList.remove("active");
};


// =======================
// AVATAR
// =======================
async function loadMyAvatar(){
  const { data } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", currentUser.id)
    .single();

  document.getElementById("myAvatar").src =
    data?.avatar_url || "https://via.placeholder.com/100";
}


// =======================
// USERS + FOLLOW
// =======================
async function loadUsers(search=""){

  let query = supabase
    .from("profiles")
    .select("id, username, avatar_url");

  if(search){
    query = query.ilike("username", `%${search}%`);
  }

  const { data: users } = await query;

  const container = document.getElementById("usersContainer");
  container.innerHTML = "";

  users.forEach(u => {

    const div = document.createElement("div");
    div.className = "user-card";

    div.innerHTML = `
      <img src="${u.avatar_url || 'https://via.placeholder.com/100'}">
      <div class="user-name">${u.username || "Utilisateur"}</div>
      <button onclick="toggleFollow('${u.id}')">Suivre</button>
    `;

    container.appendChild(div);
  });
}

// 🔍 recherche
document.getElementById("searchUser").addEventListener("input", (e)=>{
  loadUsers(e.target.value);
});

// FOLLOW
window.toggleFollow = async function(userId){

  const { data } = await supabase
    .from("follows")
    .select("id")
    .eq("follower_id", currentUser.id)
    .eq("following_id", userId)
    .single();

  if(data){
    await supabase.from("follows").delete().eq("id", data.id);
  }else{
    await supabase.from("follows").insert({
      follower_id: currentUser.id,
      following_id: userId
    });
  }

  loadUsers();
};


// =======================
// CREATE POST
// =======================
window.createPost = async function(){

  const input = document.getElementById("postInput");
  const content = input.value.trim();

  if(!content){
    alert("Écris quelque chose !");
    return;
  }

  await supabase.from("posts").insert({
    user_id: currentUser.id,
    content
  });

  input.value = "";
  loadPosts();
};


// =======================
// LIKE
// =======================
window.toggleLike = async function(postId){

  const { data } = await supabase
    .from("likes")
    .select("id")
    .eq("post_id", postId)
    .eq("user_id", currentUser.id)
    .single();

  if(data){
    await supabase.from("likes").delete().eq("id", data.id);
  }else{
    await supabase.from("likes").insert({
      user_id: currentUser.id,
      post_id: postId
    });
  }

  loadPosts();
};


// =======================
// COMMENTS
// =======================
window.openComment = async function(postId){
  currentPostId = postId;
  document.getElementById("commentModal").style.display = "flex";
  loadComments();
};

async function loadComments(){

  const { data } = await supabase
    .from("comments")
    .select(`
      content,
      profiles(username)
    `)
    .eq("post_id", currentPostId);

  const box = document.getElementById("commentsList");
  box.innerHTML = "";

  data.forEach(c=>{
    box.innerHTML += `<p><b>${c.profiles?.username}</b>: ${c.content}</p>`;
  });
}

window.sendComment = async function(){

  const input = document.getElementById("commentInput");

  if(!input.value) return;

  await supabase.from("comments").insert({
    user_id: currentUser.id,
    post_id: currentPostId,
    content: input.value
  });

  input.value = "";
  loadComments();
};


// =======================
// POSTS
// =======================
async function loadPosts(){

  const container = document.getElementById("postsContainer");
  container.innerHTML = "<div class='loader'>Chargement...</div>";

  const { data: posts } = await supabase
    .from("posts")
    .select(`
      id,
      content,
      created_at,
      profiles(username, avatar_url)
    `)
    .order("created_at", { ascending:false });

  container.innerHTML = "";

  posts.forEach(post => {

    const div = document.createElement("div");
    div.className = "post";

    const date = new Date(post.created_at).toLocaleString();

    div.innerHTML = `
      <div class="post-top">
        <img src="${post.profiles?.avatar_url || 'https://via.placeholder.com/100'}">
        <div>
          <div class="post-name">${post.profiles?.username || "Utilisateur"}</div>
          <div class="post-date">${date}</div>
        </div>
      </div>

      <div class="post-content">${post.content}</div>

      <div class="post-actions">
        <div onclick="toggleLike('${post.id}')">👍 J'aime</div>
        <div onclick="openComment('${post.id}')">💬 Commenter</div>
        <div>↗ Partager</div>
      </div>
    `;

    container.appendChild(div);
  });

}

  </script>

</body>
</html>
