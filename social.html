<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communauté MANG</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1B8F3A,#2ECC71);
  color:white;
  text-align:center;
  padding:15px;
  font-weight:700;
  font-size:18px;
}

/* TABS */
.tabs{
  display:flex;
  background:white;
  border-bottom:1px solid #ddd;
}

.tab{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  font-weight:600;
}

.tab.active{
  color:#1B8F3A;
  border-bottom:3px solid #1B8F3A;
}

/* USERS */
.users-section{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

#searchUser{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

.user-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-bottom:1px solid #eee;
}

.user-card img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.user-name{
  font-weight:600;
}

.user-card button{
  margin-left:auto;
  background:#1B8F3A;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:10px;
  cursor:pointer;
}

/* CREATE POST */
.create-post{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.create-post img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.create-post input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

.create-post button{
  background:#1B8F3A;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* POSTS */
#postsContainer{
  padding:10px;
}

.post{
  background:white;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}

.post-top{
  display:flex;
  gap:10px;
}

.post-top img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.post-name{
  font-weight:700;
}

.post-date{
  font-size:11px;
  color:#888;
}

.post-content{
  margin-top:8px;
}

.post-actions{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  border-top:1px solid #eee;
  padding-top:8px;
  font-size:13px;
  cursor:pointer;
}

/* LOADER */
.loader{
  text-align:center;
  padding:20px;
  color:#888;
}

/* MODAL COMMENT */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content{
  background:white;
  width:90%;
  max-width:400px;
  border-radius:12px;
  padding:15px;
}

#commentsList{
  max-height:200px;
  overflow-y:auto;
  margin-bottom:10px;
}

#commentInput{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  margin-bottom:10px;
}

.modal-content button{
  background:#1B8F3A;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

  /* ========================= */
/* 💬 MODAL COMMENTAIRES */
/* ========================= */

.modal{
  display:none;
  position:fixed;
  z-index:999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);

  justify-content:center;
  align-items:flex-end;
}

/* BOX */
.modal-content{
  background:white;
  width:100%;
  max-height:80%;
  border-radius:20px 20px 0 0;
  padding:15px;

  display:flex;
  flex-direction:column;
}

/* HEADER */
.comment-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
  font-size:16px;
  margin-bottom:10px;
}

.close-btn{
  cursor:pointer;
  font-size:18px;
}

/* LIST */
.comments-list{
  flex:1;
  overflow-y:auto;
  margin-bottom:10px;
}

/* COMMENT */
.comment{
  background:#f5f5f5;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

/* TOP */
.comment-top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

.comment-user{
  font-weight:700;
}

.comment-date{
  color:#888;
  font-size:11px;
}

/* CONTENT */
.comment-content{
  margin-top:5px;
  font-size:14px;
}

/* ACTIONS */
.comment-actions{
  display:flex;
  gap:15px;
  margin-top:8px;
  font-size:13px;
}

.comment-actions span{
  cursor:pointer;
  color:#555;
}

.comment-actions span:hover{
  color:#1B8F3A;
}

/* INPUT */
.comment-input-box{
  display:flex;
  gap:10px;
  border-top:1px solid #eee;
  padding-top:10px;
}

.comment-input-box input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
  outline:none;
}

.comment-input-box button{
  background:#1B8F3A;
  color:white;
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:16px;
}

/* SCROLL STYLE */
.comments-list::-webkit-scrollbar{
  width:4px;
}

.comments-list::-webkit-scrollbar-thumb{
  background:#ccc;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="header">🌿 Communauté MANG</div>

<!-- 🔥 TABS -->
<div class="tabs">
  <div class="tab active" id="tabPosts">📢 Publications</div>
  <div class="tab" id="tabUsers">👥 Membres MANG</div>
</div>

<!-- 👥 USERS -->
<div class="users-section" id="usersSection" style="display:none;">
  <h3>👥 Membres MANG</h3>

  <input type="text" id="searchUser" placeholder="Rechercher un utilisateur...">
  <div id="usersContainer"></div>
</div>

<!-- 📢 POSTS -->
<div id="postsSection">

  <div class="create-post">
    <img id="myAvatar" src="https://via.placeholder.com/100">
    <input type="text" id="postInput" placeholder="Exprimez-vous sur MANG...">
    <button onclick="createPost()">Publier</button>
  </div>

  <div id="postsContainer">
    <div class="loader">Chargement...</div>
  </div>

</div>

  <!-- 💬 MODAL COMMENTAIRES -->
<div id="commentModal" class="modal">

  <div class="modal-content">

    <!-- HEADER -->
    <div class="comment-header">
      <span>💬 Commentaires</span>
      <span class="close-btn" onclick="closeComments()">✖</span>
    </div>

    <!-- LISTE -->
    <div id="commentsList" class="comments-list">
      Chargement...
    </div>

    <!-- INPUT -->
    <div class="comment-input-box">
      <input 
        type="text" 
        id="commentInput" 
        placeholder="Écrire un commentaire..."
      >
      <button onclick="sendComment()">➤</button>
    </div>

  </div>

</div>

  <script type="module">

import { supabase } from './supabase.js';

let currentUser;
let currentPostId = null;

// =======================
// INIT
// =======================
async function init(){
  const { data:{user}, error } = await supabase.auth.getUser();

  if(error || !user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  await loadMyAvatar();
  await loadPosts();
  await loadUsers();
}

init();


// =======================
// 🔥 TABS
// =======================
const tabPosts = document.getElementById("tabPosts");
const tabUsers = document.getElementById("tabUsers");

const postsSection = document.getElementById("postsSection");
const usersSection = document.getElementById("usersSection");

tabPosts.onclick = () => {
  postsSection.style.display = "block";
  usersSection.style.display = "none";
  tabPosts.classList.add("active");
  tabUsers.classList.remove("active");
};

tabUsers.onclick = () => {
  postsSection.style.display = "none";
  usersSection.style.display = "block";
  tabUsers.classList.add("active");
  tabPosts.classList.remove("active");
};


// =======================
// AVATAR
// =======================
async function loadMyAvatar(){
  const { data } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", currentUser.id)
    .single();

  document.getElementById("myAvatar").src =
    data?.avatar_url || "https://via.placeholder.com/100";
}


// =======================
// USERS
// =======================
async function loadUsers(search=""){

  let query = supabase
    .from("profiles")
    .select("id, username, avatar_url");

  if(search){
    query = query.ilike("username", `%${search}%`);
  }

  const { data: users, error } = await query;

  const container = document.getElementById("usersContainer");
  container.innerHTML = "";

  if(error){
    container.innerHTML = "Erreur chargement";
    return;
  }

  users.forEach(u => {

    const div = document.createElement("div");
    div.className = "user-card";

    div.innerHTML = `
      <img src="${u.avatar_url || 'https://via.placeholder.com/100'}">
      <div class="user-name">${u.username || "Utilisateur"}</div>
      <button onclick="toggleFollow('${u.id}')">Suivre</button>
    `;

    container.appendChild(div);
  });
}

document.getElementById("searchUser").addEventListener("input", (e)=>{
  loadUsers(e.target.value);
});


// =======================
// FOLLOW
// =======================
window.toggleFollow = async function(userId){

  const { data } = await supabase
    .from("follows")
    .select("id")
    .eq("follower_id", currentUser.id)
    .eq("following_id", userId)
    .maybeSingle();

  if(data){
    await supabase.from("follows").delete().eq("id", data.id);
  }else{
    await supabase.from("follows").insert({
      follower_id: currentUser.id,
      following_id: userId
    });
  }

  loadUsers();
};


// =======================
// CREATE POST
// =======================
window.createPost = async function(){

  const input = document.getElementById("postInput");
  const content = input.value.trim();

  if(!content){
    alert("Écris quelque chose !");
    return;
  }

  const { error } = await supabase.from("posts").insert({
    user_id: currentUser.id,
    content
  });

  if(error){
    alert(error.message);
    return;
  }

  input.value = "";
  loadPosts();
};


// =======================
// LIKE
// =======================
window.toggleLike = async function(postId){

  const { data } = await supabase
    .from("likes")
    .select("id")
    .eq("post_id", postId)
    .eq("user_id", currentUser.id)
    .maybeSingle();

  if(data){
    await supabase.from("likes").delete().eq("id", data.id);
  }else{
    await supabase.from("likes").insert({
      user_id: currentUser.id,
      post_id: postId
    });
  }

  loadPosts();
};

    // =======================
// 💬 COMMENTS SYSTEM FULL
// =======================

window.openComments = async function(postId){
  currentPostId = postId;
  document.getElementById("commentModal").style.display = "flex";
  loadComments();
};

window.closeComments = function(){
  document.getElementById("commentModal").style.display = "none";
};


// =======================
// 📥 LOAD COMMENTS
// =======================
async function loadComments(){

  const box = document.getElementById("commentsList");
  box.innerHTML = "Chargement...";

  const { data: comments, error } = await supabase
    .from("comments")
    .select("id, content, user_id, created_at")
    .eq("post_id", currentPostId)
    .order("created_at", { ascending: true });

  if(error){
    console.error(error);
    box.innerHTML = "Erreur chargement";
    return;
  }

  if(!comments || comments.length === 0){
    box.innerHTML = "<p>Aucun commentaire</p>";
    return;
  }

  box.innerHTML = "";

  // 🔥 boucle commentaires
  for (let c of comments){

    // 👤 profil
    const { data: profile } = await supabase
      .from("profiles")
      .select("username, avatar_url")
      .eq("id", c.user_id)
      .single();

    // 👍 nombre de likes
    const { count } = await supabase
      .from("likes_comment")
      .select("*", { count: "exact", head: true })
      .eq("comment_id", c.id);

    // ❤️ vérifier si moi j'ai liké
    const { data: myLike } = await supabase
      .from("likes_comment")
      .select("id")
      .eq("comment_id", c.id)
      .eq("user_id", currentUser.id)
      .maybeSingle();

    box.innerHTML += `
  <div class="comment">

    <div class="comment-top">
      <span class="comment-user">${profile?.username || "Utilisateur"}</span>
      <span class="comment-date">${new Date(c.created_at).toLocaleString()}</span>
    </div>

    <div class="comment-content">
      ${c.content}
    </div>

    <div class="comment-actions">
      <span onclick="toggleLikeComment('${c.id}')">👍 ${count || 0}</span>
      <span onclick="replyComment('${c.id}')">💬 Répondre</span>

      ${
        c.user_id === currentUser.id
        ? `
          <span onclick="editComment('${c.id}', \`${c.content}\`)">✏ Modifier</span>
          <span onclick="deleteComment('${c.id}')">🗑 Supprimer</span>
        `
        : ""
      }
    </div>

  </div>
`;
    
  }
}


// =======================
// ✍️ SEND COMMENT
// =======================
window.sendComment = async function(){

  const input = document.getElementById("commentInput");
  const content = input.value.trim();

  if(!content){
    alert("Écris un commentaire !");
    return;
  }

  const { error } = await supabase
    .from("comments")
    .insert({
      user_id: currentUser.id,
      post_id: currentPostId,
      content
    });

  if(error){
    alert(error.message);
    return;
  }

  input.value = "";
  loadComments();
};


// =======================
// 👍 LIKE COMMENT
// =======================
window.toggleLikeComment = async function(commentId){

  const { data } = await supabase
    .from("likes_comment")
    .select("id")
    .eq("comment_id", commentId)
    .eq("user_id", currentUser.id)
    .maybeSingle();

  if(data){
    await supabase
      .from("likes_comment")
      .delete()
      .eq("id", data.id);
  }else{
    await supabase
      .from("likes_comment")
      .insert({
        user_id: currentUser.id,
        comment_id: commentId
      });
  }

  loadComments();
};


// =======================
// 🗑 DELETE COMMENT
// =======================
window.deleteComment = async function(id){

  if(!confirm("Supprimer ce commentaire ?")) return;

  await supabase
    .from("comments")
    .delete()
    .eq("id", id);

  loadComments();
};


// =======================
// ✏ EDIT COMMENT
// =======================
window.editComment = async function(id, oldContent){

  const newContent = prompt("Modifier ton commentaire :", oldContent);

  if(!newContent) return;

  await supabase
    .from("comments")
    .update({ content: newContent })
    .eq("id", id);

  loadComments();
};


// =======================
// 💬 REPLY COMMENT
// =======================
window.replyComment = function(commentId){

  const text = prompt("Répondre à ce commentaire");

  if(!text) return;

  supabase.from("comments").insert({
    user_id: currentUser.id,
    post_id: currentPostId,
    content: text,
    parent_id: commentId
  }).then(()=>{
    loadComments();
  });
};


// =======================
// POSTS
// =======================
async function loadPosts(){

  const container = document.getElementById("postsContainer");
  container.innerHTML = "<div class='loader'>Chargement...</div>";

  const { data: posts, error } = await supabase
    .from("posts")
    .select(`
      id,
      content,
      created_at,
      profiles(username, avatar_url)
    `)
    .order("created_at", { ascending:false });

  if(error){
    container.innerHTML = "Erreur chargement";
    return;
  }

  container.innerHTML = "";

  posts.forEach(post => {

    const date = new Date(post.created_at).toLocaleString();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="post-top">
        <img src="${post.profiles?.avatar_url || 'https://via.placeholder.com/100'}">
        <div>
          <div class="post-name">${post.profiles?.username || "Utilisateur"}</div>
          <div class="post-date">${date}</div>
        </div>
      </div>

      <div class="post-content">${post.content}</div>

      <div class="post-actions">
        <div onclick="toggleLike('${post.id}')">👍 J'aime</div>
        <div onclick="openComments('${post.id}')">💬 Commenter</div>
        <div>↗ Partager</div>
      </div>
    `;

    container.appendChild(div);
  });

}

  </script>
</body>
</html>
