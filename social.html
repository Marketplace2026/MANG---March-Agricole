<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communauté MANG</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1B8F3A,#2ECC71);
  color:white;
  text-align:center;
  padding:15px;
  font-weight:700;
  font-size:18px;
}

/* USERS SECTION */
.users-section{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

#searchUser{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

.user-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-bottom:1px solid #eee;
}

.user-card img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
}

.user-name{
  font-weight:600;
}

/* CREATE POST */
.create-post{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.create-post img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
}

.create-post input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

.create-post button{
  background:#1B8F3A;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
}

/* POSTS */
#postsContainer{
  padding:10px;
}

.post{
  background:white;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}

.post-top{
  display:flex;
  gap:10px;
}

.post-top img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.post-name{
  font-weight:700;
}

.post-date{
  font-size:11px;
  color:#888;
}

.post-content{
  margin-top:8px;
}

.post-actions{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  border-top:1px solid #eee;
  padding-top:8px;
}

.loader{
  text-align:center;
  padding:20px;
  color:#888;
}

</style>
</head>

<body>

<div class="header">🌿 Communauté MANG</div>

<!-- 👥 USERS -->
<div class="users-section">
  <h3>👥 Membres MANG</h3>

  <input type="text" id="searchUser" placeholder="Rechercher un utilisateur...">

  <div id="usersContainer"></div>
</div>

<!-- CREATE POST -->
<div class="create-post">
  <img id="myAvatar" src="">
  <input type="text" id="postInput" placeholder="Exprimez-vous sur MANG...">
  <button onclick="createPost()">Publier</button>
</div>

<!-- POSTS -->
<div id="postsContainer">
  <div class="loader">Chargement...</div>
</div>

<script type="module">

import { supabase } from './supabase.js';

let currentUser;

// =======================
// INIT
// =======================
async function init(){

  const { data:{user} } = await supabase.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  loadMyAvatar();
  loadPosts();
  loadUsers(); // 🔥 IMPORTANT

}

init();


// =======================
// AVATAR
// =======================
async function loadMyAvatar(){
  const { data } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", currentUser.id)
    .single();

  document.getElementById("myAvatar").src =
    data?.avatar_url || "https://via.placeholder.com/100";
}


// =======================
// USERS (🔥 NOUVEAU)
// =======================
async function loadUsers(search=""){

  let query = supabase
    .from("profiles")
    .select("id, username, avatar_url");

  if(search){
    query = query.ilike("username", `%${search}%`);
  }

  const { data: users, error } = await query;

  const container = document.getElementById("usersContainer");
  container.innerHTML = "";

  if(error){
    container.innerHTML = "Erreur chargement utilisateurs";
    return;
  }

  users.forEach(u => {

    const div = document.createElement("div");
    div.className = "user-card";

    div.innerHTML = `
      <img src="${u.avatar_url || 'https://via.placeholder.com/100'}">
      <div class="user-name">${u.username || "Utilisateur"}</div>
    `;

    container.appendChild(div);

  });

}

// 🔍 recherche
document.getElementById("searchUser").addEventListener("input", (e)=>{
  loadUsers(e.target.value);
});


// =======================
// CREATE POST
// =======================
window.createPost = async function(){

  const input = document.getElementById("postInput");
  const content = input.value.trim();

  if(!content){
    alert("Écris quelque chose !");
    return;
  }

  await supabase.from("posts").insert({
    user_id: currentUser.id,
    content
  });

  input.value = "";
  loadPosts();
};


// =======================
// LOAD POSTS
// =======================
async function loadPosts(){

  const container = document.getElementById("postsContainer");
  container.innerHTML = "<div class='loader'>Chargement...</div>";

  const { data: posts, error } = await supabase
    .from("posts")
    .select(`
      content,
      created_at,
      profiles(username, avatar_url)
    `)
    .order("created_at", { ascending:false });

  if(error){
    container.innerHTML = "Erreur chargement";
    return;
  }

  container.innerHTML = "";

  posts.forEach(post => {

    const div = document.createElement("div");
    div.className = "post";

    const date = new Date(post.created_at).toLocaleString();

    div.innerHTML = `
      <div class="post-top">
        <img src="${post.profiles?.avatar_url || 'https://via.placeholder.com/100'}">
        <div>
          <div class="post-name">${post.profiles?.username || "Utilisateur"}</div>
          <div class="post-date">${date}</div>
        </div>
      </div>

      <div class="post-content">${post.content}</div>

      <div class="post-actions">
        <div>👍 J'aime</div>
        <div>💬 Commenter</div>
        <div>↗ Partager</div>
      </div>
    `;

    container.appendChild(div);

  });

}

</script>

</body>
</html>
