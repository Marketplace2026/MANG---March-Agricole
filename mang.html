<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  padding:15px;
  background:linear-gradient(135deg,#1B8F3A,#2ECC71);

color:white;
  font-weight:700;
}

.back{
  position:absolute;
  left:15px;
  cursor:pointer;
}

/* TOP */
.profile-top{
  background:white;
  padding:15px;
  display:flex;
  gap:12px;
  align-items:center;
}

.avatar{
  width:65px;
  height:65px;
  border-radius:50%;
  background:#ddd;
  overflow:hidden;
  cursor:pointer;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.user-info{
  flex:1;
}

.username{
  font-weight:700;
}

.section{
  margin-top:10px;
  background:white;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:last-child{
  border-bottom:none;
}

.item-right{
  color:#888;
}

.arrow{
  margin-left:6px;
}

  .modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);

  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  background:white;
  width:85%;
  border-radius:15px;
  padding:20px;
  animation:fadeIn 0.2s ease;
}

.modal-content h3{
  margin:0 0 15px;
}

.modal-content input{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:15px;
}

.modal-actions button{
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
}

.modal-actions button:last-child{
  background:#16a34a;
  color:white;
}

@keyframes fadeIn{
  from{transform:scale(0.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<div class="header">
  <span class="back">←</span>
  Profil
</div>

<div class="profile-top">

  <div class="avatar" id="avatar">
    <img id="avatarImg" src="">
  </div>

  <div class="user-info">
    <div class="username" id="username">...</div>
    <div>🇧🇯 BJ</div>
  </div>

</div>

<div class="section">

  <div class="item" id="editName">
    <div>Nom complet</div>
    <div class="item-right" id="fullname">--- <span class="arrow">›</span></div>
  </div>

  <div class="item">
    <div>E-mail</div>
    <div class="item-right" id="email">---</div>
  </div>

  <div class="item" id="editPhone">
    <div>Téléphone</div>
    <div class="item-right" id="phone">Incomplet <span class="arrow">›</span></div>
  </div>

<div id="modalName" class="modal">

  <div class="modal-content">
    <h3>Modifier le nom</h3>

    <input type="text" id="inputName" placeholder="Entrez votre nom">

    <div class="modal-actions">
      <button onclick="closeModal()">Annuler</button>
      <button onclick="saveName()">OK</button>
    </div>
  </div>

</div>
  
  <div class="item" id="changePassword">
    <div>Mot de passe</div>
    <div class="arrow">›</div>
  </div>

</div>

<input type="file" id="fileInput" hidden>

<script type="module">
import { supabase } from './supabase.js';
  
 

let currentUser;

// =======================
// LOAD USER
// =======================
async function loadUser(){

  const { data: { user }, error } = await supabase.auth.getUser();

  if(error || !user){
    location.href = "login.html";
    return;
  }

  currentUser = user;

  const { data: profile, error: profileError } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if(profileError){
    console.error("PROFILE ERROR:", profileError);
  }

  const username = profile?.username || "Utilisateur";
  const fullname = profile?.fullname || "Non défini";
  const phone = profile?.phone || "Incomplet";

  const email = user.email.replace(/(.{3}).+(@.+)/, "$1****$2");

  document.getElementById("username").textContent = username;
  document.getElementById("fullname").innerHTML = fullname + " ›";
  document.getElementById("email").textContent = email;
  document.getElementById("phone").innerHTML = phone + " ›";

  // 🔥 AVATAR
  const avatarImg = document.getElementById("avatarImg");

  if(profile?.avatar_url){
    avatarImg.src = profile.avatar_url;
  }else{
    avatarImg.src = "https://via.placeholder.com/100";
  }

}

loadUser();

  // =======================
// MODAL NAME HANDLER
// =======================

// Ouvrir le modal
document.getElementById("editName").addEventListener("click", () => {
  const modal = document.getElementById("modalName");
  modal.style.display = "flex";

  // Pré-remplir l'input avec le nom actuel
  const currentName = currentUser?.fullname || "";
  document.getElementById("inputName").value = currentName;
});

// Fermer le modal
function closeModal() {
  document.getElementById("modalName").style.display = "none";
}

// Sauvegarder le nom
async function saveName() {
  const name = document.getElementById("inputName").value.trim();
  if (!name) {
    alert("Le nom ne peut pas être vide !");
    return;
  }

  const { error } = await supabase.from("profiles")
    .update({ fullname: name })
    .eq("id", currentUser.id);

  if (error) {
    alert(error.message);
  } else {
    loadUser(); // recharge l'utilisateur avec le nouveau nom
    closeModal();
  }
}

// Lier les boutons du modal
document.getElementById("modalName").querySelector("button:nth-child(1)").addEventListener("click", closeModal);
document.getElementById("modalName").querySelector("button:nth-child(2)").addEventListener("click", saveName);

// Fermer le modal si clic en dehors
window.addEventListener("click", (e) => {
  const modal = document.getElementById("modalName");
  if (e.target === modal) closeModal();
});
  
// =======================
// EDIT PHONE
// =======================
document.getElementById("editPhone").onclick = async () => {

  const phone = prompt("Votre numéro :");
  if(!phone) return;

  const { error } = await supabase.from("profiles")
    .update({ phone })
    .eq("id", currentUser.id);

  if(error){
    alert(error.message);
  }

  loadUser();
};


// =======================
// PASSWORD
// =======================
document.getElementById("changePassword").onclick = async () => {

  const pass = prompt("Nouveau mot de passe");
  if(!pass) return;

  const { error } = await supabase.auth.updateUser({
    password: pass
  });

  if(error){
    alert(error.message);
  }else{
    alert("Mot de passe modifié ✅");
  }

};


// =======================
// UPLOAD PHOTO (🔥 FIX TOTAL)
// =======================
document.getElementById("avatar").onclick = () => {
  document.getElementById("fileInput").click();
};

document.getElementById("fileInput").addEventListener("change", async (e) => {

  const file = e.target.files[0];
  if(!file) return;

  // 🔥 PREVIEW DIRECT (effet pro)
  const previewURL = URL.createObjectURL(file);
  document.getElementById("avatarImg").src = previewURL;

  const fileName = currentUser.id + "/avatar.png";

  // 🔥 UPLOAD AVEC CHECK
  const { error: uploadError } = await supabase.storage
    .from("avatars")
    .upload(fileName, file, { upsert: true });

  if(uploadError){
    console.error("UPLOAD ERROR:", uploadError);
    alert("Erreur upload: " + uploadError.message);
    return;
  }

  // 🔥 GET URL
  const { data } = supabase.storage
    .from("avatars")
    .getPublicUrl(fileName);

  const url = data.publicUrl;

  console.log("IMAGE URL:", url);

  // 🔥 SAVE DB
  const { error: dbError } = await supabase
    .from("profiles")
    .update({ avatar_url: url })
    .eq("id", currentUser.id);

  if(dbError){
    console.error("DB ERROR:", dbError);
    alert("Erreur DB: " + dbError.message);
    return;
  }

  // 🔥 FINAL IMAGE (serveur)
  document.getElementById("avatarImg").src = url;

});


// =======================
// BACK
// =======================
document.querySelector(".back").onclick = () => history.back();

</script>

</body>
</html>
