<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  padding:15px;
  background:linear-gradient(135deg,#1B8F3A,#2ECC71);
  color:white;
  font-weight:700;
}

.back{
  position:absolute;
  left:15px;
  cursor:pointer;
}

/* TOP */
.profile-top{
  background:white;
  padding:15px;
  display:flex;
  gap:12px;
  align-items:center;
}

.avatar{
  width:65px;
  height:65px;
  border-radius:50%;
  background:#ddd;
  overflow: visible; /* Permet au badge de dépasser */
  cursor:pointer;
  position:relative;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

/* Badge + débordant du cercle */
.avatar-add {
  position: absolute;
  bottom: -5px;  /* légèrement en dehors */
  right: -5px;   /* légèrement en dehors */
  background: #16a34a;
  color: white;
  font-weight: bold;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  border: 2px solid white;
  font-size: 16px;
  box-shadow: 0 0 3px rgba(0,0,0,0.3);
}

.user-info{
  flex:1;
}

.username{
  font-weight:700;
}

.section{
  margin-top:10px;
  background:white;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:last-child{
  border-bottom:none;
}

.item-right{
  color:#888;
}

.arrow{
  margin-left:6px;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  background:white;
  width:85%;
  border-radius:15px;
  padding:20px;
  animation:fadeIn 0.2s ease;
}

.modal-content h3{
  margin:0 0 15px;
}

.modal-content input{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:15px;
}

.modal-actions button{
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
}

.modal-actions button:last-child{
  background:#16a34a;
  color:white;
}

@keyframes fadeIn{
  from{transform:scale(0.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* Plein écran avatar */
#avatarFullScreen {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#avatarFullScreen img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
  object-fit: contain;
}

#avatarFullScreen span {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 30px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <span class="back">←</span>
  Profil
</div>

<div class="profile-top">
  <div class="avatar" id="avatar">
    <img id="avatarImg" src="https://via.placeholder.com/100">
    <div class="avatar-add" id="avatarAdd">+</div>
  </div>

  <div class="user-info">
    <div class="username" id="username">...</div>
    <div>🇧🇯 BJ</div>
  </div>
</div>

<div class="section">

  <div class="item" id="editName">
    <div>Nom complet</div>
    <div class="item-right" id="fullname">--- <span class="arrow">›</span></div>
  </div>

  <div class="item" id="editUsername">
  <div>Nom d'utilisateur</div>
  <div class="item-right" id="usernameValue">
    --- <span class="arrow">›</span>
  </div>
  </div>

  <div class="item">
    <div>E-mail</div>
    <div class="item-right" id="email">---</div>
  </div>

  <div class="item" id="editPhone">
    <div>Téléphone</div>
    <div class="item-right" id="phone">Incomplet <span class="arrow">›</span></div>
  </div>

  <div class="item" id="changePassword">
    <div>Mot de passe</div>
    <div class="arrow">›</div>
  </div>

</div>

<!-- Modal Nom -->
<div id="modalName" class="modal">
  <div class="modal-content">
    <h3>Modifier le nom</h3>
    <input type="text" id="inputName" placeholder="Entrez votre nom">
    <div class="modal-actions">
      <button id="cancelName">Annuler</button>
      <button id="saveNameBtn">OK</button>
    </div>
  </div>
</div>

<div id="modalUsername" class="modal">
  <div class="modal-content">
    <h3>Modifier le nom d'utilisateur</h3>

    <input 
      type="text" 
      id="inputUsername" 
      placeholder="Nouveau nom d'utilisateur"
      autocomplete="off"
    >

    <div class="modal-actions">
      <button onclick="closeUsernameModal()">Annuler</button>
      <button onclick="saveUsername()">OK</button>
    </div>
  </div>
</div>
  
  <div id="modalPhone" class="modal">
  <div class="modal-content">
    <h3>Modifier le téléphone</h3>

    <input type="text" id="inputPhone" placeholder="Votre numéro">

    <div class="modal-actions">
      <button onclick="closePhoneModal()">Annuler</button>
      <button onclick="savePhone()">OK</button>
    </div>
  </div>
  </div>

  <div id="modalPassword" class="modal">
  <div class="modal-content">
    <h3>Changer le mot de passe</h3>

    <input type="password" id="inputPassword" placeholder="Nouveau mot de passe">

    <div class="modal-actions">
      <button onclick="closePasswordModal()">Annuler</button>
      <button onclick="savePassword()">OK</button>
    </div>
  </div>
  </div>

<!-- Plein écran avatar -->
<div id="avatarFullScreen">
  <span id="closeAvatarFull">&times;</span>
  <img id="avatarFullImg" src="">
</div>

<input type="file" id="fileInput" hidden>

<script type="module">
import { supabase } from './supabase.js';

let currentUser;

// =======================
// LOAD USER
// =======================
async function loadUser(){
  const { data: { user }, error } = await supabase.auth.getUser();

  if(error || !user){
    location.href = "login.html";
    return;
  }

  currentUser = user;

  const { data: profile, error: profileError } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if(profileError){
    console.error("PROFILE ERROR:", profileError);
  }

  const username = profile?.username || "Utilisateur";
  const fullname = profile?.fullname || "Non défini";
  const phone = profile?.phone || "Incomplet";
  const email = user.email.replace(/(.{3}).+(@.+)/, "$1****$2");

  document.getElementById("username").textContent = username;
  document.getElementById("fullname").innerHTML = fullname + " ›";
  document.getElementById("email").textContent = email;
  document.getElementById("phone").innerHTML = phone + " ›";

  const avatarImg = document.getElementById("avatarImg");
  avatarImg.src = profile?.avatar_url || "https://via.placeholder.com/100";
}

loadUser();

// =======================
// MODAL NAME HANDLER
// =======================
document.getElementById("editName").addEventListener("click", () => {
  const modal = document.getElementById("modalName");
  modal.style.display = "flex";
  const currentName = currentUser?.fullname || "";
  document.getElementById("inputName").value = currentName;
});

function closeModal() {
  document.getElementById("modalName").style.display = "none";
}

async function saveName() {
  const name = document.getElementById("inputName").value.trim();
  if(!name){ alert("Le nom ne peut pas être vide !"); return; }

  const { error } = await supabase.from("profiles")
    .update({ fullname: name })
    .eq("id", currentUser.id);

  if(error){ alert(error.message); }
  else { loadUser(); closeModal(); }
}

document.getElementById("cancelName").addEventListener("click", closeModal);
document.getElementById("saveNameBtn").addEventListener("click", saveName);

window.addEventListener("click", (e) => {
  const modal = document.getElementById("modalName");
  if(e.target === modal) closeModal();
});


  // =======================
// MODAL USERNAME HANDLER
// =======================

// Ouvrir
document.getElementById("editUsername").addEventListener("click", () => {

  document.getElementById("modalUsername").style.display = "flex";

  // pré-remplir avec username actuel
  const current = document.getElementById("username").textContent;
  document.getElementById("inputUsername").value = current;
});


// Fermer
function closeUsernameModal() {
  document.getElementById("modalUsername").style.display = "none";
}


// Sauvegarder
async function saveUsername() {

  const username = document.getElementById("inputUsername").value.trim();

  if (!username || username.length < 3) {
    alert("Nom d'utilisateur trop court !");
    return;
  }

  const { error } = await supabase
    .from("profiles")
    .update({ username })
    .eq("id", currentUser.id);

  if (error) {
    alert(error.message);
  } else {
    loadUser();
    closeUsernameModal();
  }
}


// Boutons
const usernameModal = document.getElementById("modalUsername");

usernameModal.querySelector("button:nth-child(1)")
  .addEventListener("click", closeUsernameModal);

usernameModal.querySelector("button:nth-child(2)")
  .addEventListener("click", saveUsername);

// =======================
// MODAL PHONE HANDLER
// =======================

// Ouvrir
document.getElementById("editPhone").addEventListener("click", () => {
  const modal = document.getElementById("modalPhone");
  modal.style.display = "flex";

  // pré-remplir
  const currentPhone = document.getElementById("phone").innerText.replace("›","").trim();
  document.getElementById("inputPhone").value = currentPhone;
});

// Fermer
function closePhoneModal() {
  document.getElementById("modalPhone").style.display = "none";
}

// Sauvegarder
async function savePhone() {

  const phone = document.getElementById("inputPhone").value.trim();

  if (!phone) {
    alert("Numéro invalide !");
    return;
  }

  const { error } = await supabase
    .from("profiles")
    .update({ phone })
    .eq("id", currentUser.id);

  if (error) {
    alert(error.message);
  } else {
    loadUser();
    closePhoneModal();
  }
}

// Boutons
const phoneModal = document.getElementById("modalPhone");

phoneModal.querySelector("button:nth-child(1)").addEventListener("click", closePhoneModal);
phoneModal.querySelector("button:nth-child(2)").addEventListener("click", savePhone);

  // =======================
// MODAL PASSWORD HANDLER
// =======================

// Ouvrir
document.getElementById("changePassword").addEventListener("click", () => {
  document.getElementById("modalPassword").style.display = "flex";
});

// Fermer
function closePasswordModal() {
  document.getElementById("modalPassword").style.display = "none";
}

// Sauvegarder
async function savePassword() {

  const pass = document.getElementById("inputPassword").value.trim();

  if (!pass || pass.length < 6) {
    alert("Mot de passe trop court !");
    return;
  }

  const { error } = await supabase.auth.updateUser({
    password: pass
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Mot de passe modifié ✅");
    closePasswordModal();
  }
}

// Boutons
const passwordModal = document.getElementById("modalPassword");

passwordModal.querySelector("button:nth-child(1)").addEventListener("click", closePasswordModal);
passwordModal.querySelector("button:nth-child(2)").addEventListener("click", savePassword);
  
// =======================
// AVATAR HANDLER
// =======================
document.getElementById("avatarAdd").addEventListener("click", () => {
  document.getElementById("fileInput").click();
});

document.getElementById("avatar").addEventListener("click", (e) => {
  if(e.target.id === "avatarAdd") return;
  const fullImg = document.getElementById("avatarFullImg");
  fullImg.src = document.getElementById("avatarImg").src;
  document.getElementById("avatarFullScreen").style.display = "flex";
});

document.getElementById("closeAvatarFull").addEventListener("click", () => {
  document.getElementById("avatarFullScreen").style.display = "none";
});

document.getElementById("avatarFullScreen").addEventListener("click", (e) => {
  if(e.target.id === "avatarFullScreen") {
    document.getElementById("avatarFullScreen").style.display = "none";
  }
});

document.getElementById("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const previewURL = URL.createObjectURL(file);
  document.getElementById("avatarImg").src = previewURL;

  const fileName = currentUser.id + "/avatar.png";

  const { error: uploadError } = await supabase.storage.from("avatars").upload(fileName, file, { upsert: true });
  if(uploadError){ alert("Erreur upload: " + uploadError.message); return; }

  const { data } = supabase.storage.from("avatars").getPublicUrl(fileName);
  const url = data.publicUrl;

  const { error: dbError } = await supabase.from("profiles").update({ avatar_url: url }).eq("id", currentUser.id);
  if(dbError){ alert("Erreur DB: " + dbError.message); return; }

  document.getElementById("avatarImg").src = url;
});

// =======================
// BACK
// =======================
document.querySelector(".back").onclick = () => history.back();
</script>

</body>
</html>
